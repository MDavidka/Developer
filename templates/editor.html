<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Editor: {{ bot.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body class="app-container">
    <header class="app-header">
        <h1>Editing: {{ bot.name }}</h1>
        <a href="{{ url_for('logout') }}" title="Logout">
            <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="avatar">
        </a>
    </header>

    <div class="editor-controls">
        <a href="{{ url_for('dashboard') }}" class="button-2">Back to Dashboard</a>
    </div>

    <div class="radio-inputs">
        <label class="radio">
            <input type="radio" name="main-tab" value="files" checked>
            <span class="name">File Manager</span>
        </label>
        <label class="radio">
            <input type="radio" name="main-tab" value="console">
            <span class="name">Console</span>
        </label>
        <label class="radio">
            <input type="radio" name="main-tab" value="settings">
            <span class="name">Settings</span>
        </label>
    </div>

    <main class="editor-main-content">
        <!-- Files/Editor Tab -->
        <div id="files-tab" class="main-tab-content active" style="flex-direction: row;">
            <!-- File Browser -->
            <div id="file-browser-view" style="width: 30%; min-width: 200px; resize: horizontal; overflow: auto;">
                <div class="file-manager-container">
                    <div class="file-actions">
                        <button id="new-file-btn" class="button-2">New File</button>
                        <button id="new-folder-btn" class="button-2">New Folder</button>
                    </div>
                    <ul id="file-tree" class="file-tree">
                        <!-- File tree will be populated by JavaScript -->
                    </ul>
                </div>
            </div>
            <div class="resizer" id="resizer"></div>
            <!-- File Editor -->
            <div class="file-editor-view" style="flex-grow: 1; display: flex;">
                <div class="editor-toolbar">
                    <span id="editing-filename"></span>
                    <button id="save-file-btn" class="button-2">Save</button>
                </div>
                <div class="editor-area">
                    <div id="editor-container"></div>
                </div>
            </div>
        </div>

        <!-- Console Tab -->
        <div id="console-tab" class="main-tab-content">
             <div class="console-container">
                <div class="console-actions">
                    <button class="button-2" id="start-bot-btn-console">Start Bot</button>
                    <button class="button-2" id="stop-bot-btn-console">Stop Bot</button>
                </div>
                <div id="console" class="console"></div>
                <div class="console-footer">
                    <span>Status: <span id="bot-status-console">{{ bot.status }}</span></span>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="main-tab-content">
            <div class="settings-container">
                <div class="setting-card frosted-glass">
                    <h3>Startup Command</h3>
                    <input type="text" id="startup-command-input" value="{{ bot.startup_command }}" class="frosted-input">
                    <button id="save-startup-command" class="button-2">Save</button>
                </div>
                <div class="setting-card frosted-glass">
                    <h3>Package Management</h3>
                    <div class="package-manager">
                        <input type="text" id="package-name-input" placeholder="e.g., requests" class="frosted-input">
                        <button id="install-package-btn" class="button-2">Install</button>
                    </div>
                    <ul id="package-list" class="package-list">
                        {% for pkg in bot.packages %}
                        <li>
                            <span>{{ pkg }}</span>
                            <button class="uninstall-package-btn button-2" data-package="{{ pkg }}">Uninstall</button>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const serverIndex = {{ request.view_args.server_index }};
            const botId = "{{ bot._id }}"; // This is the constructed workspace ID

            // Main tab switching
            const mainTabs = document.querySelectorAll('input[name="main-tab"]');
            const mainTabContents = document.querySelectorAll('.main-tab-content');
            mainTabs.forEach(tab => {
                tab.addEventListener('change', () => {
                    mainTabContents.forEach(content => content.classList.remove('active'));
                    document.getElementById(tab.value + '-tab').classList.add('active');
                });
            });

            // File Manager & Resizer
            const fileBrowserView = document.getElementById('file-browser-view');
            const fileEditorView = document.getElementById('file-editor-view');
            const resizer = document.getElementById('resizer');
            const fileTree = document.getElementById('file-tree');

            let currentOpenFile = null;

            resizer.addEventListener('mousedown', function(e) {
                e.preventDefault();
                window.addEventListener('mousemove', resize);
                window.addEventListener('mouseup', stopResize);
            });

            function resize(e) {
                const newWidth = e.clientX - fileBrowserView.getBoundingClientRect().left;
                fileBrowserView.style.width = newWidth + 'px';
            }

            function stopResize() {
                window.removeEventListener('mousemove', resize);
            }
            const editor = CodeMirror(document.getElementById('editor-container'), {
                mode: 'python',
                theme: 'material-darker',
                lineNumbers: true,
                autofocus: true
            });

            function renderFileTree(tree, container, pathPrefix = '') {
                container.innerHTML = '';
                Object.entries(tree).forEach(([name, content]) => {
                    const fullPath = pathPrefix ? `${pathPrefix}/${name}` : name;
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.dataset.path = fullPath;

                    if (typeof content === 'object') { // It's a folder
                        li.classList.add('folder');
                        // You can add folder-specific icons or logic here
                    } else { // It's a file
                        li.classList.add('file');
                        li.addEventListener('click', () => openFile(fullPath));
                    }
                    container.appendChild(li);
                });
            }

            async function openFile(path) {
                const response = await fetch(`/api/server/${serverIndex}/file?path=${path}`);
                const data = await response.json();
                if (data.content !== undefined) {
                    currentOpenFile = path;
                    editor.setValue(data.content);
                    document.getElementById('editing-filename').textContent = path;
                    fileBrowserView.style.display = 'none';
                    fileEditorView.style.display = 'flex';
                }
            }

            backToBrowserBtn.addEventListener('click', () => {
                currentOpenFile = null;
                fileBrowserView.style.display = 'block';
                fileEditorView.style.display = 'none';
            });

            document.getElementById('save-file-btn').addEventListener('click', async () => {
                if (!currentOpenFile) return;
                await fetch(`/api/server/${serverIndex}/file?path=${currentOpenFile}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content: editor.getValue() })
                });
                // Maybe add a small "saved" notification
            });

            document.getElementById('new-file-btn').addEventListener('click', async () => {
                const path = prompt("Enter new file path (e.g., main.py or folder/main.py):");
                if (path) {
                    await fetch(`/api/server/${serverIndex}/files/create`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ path: path, type: 'file' })
                    });
                    location.reload(); // Simple refresh to show new file
                }
            });

            document.getElementById('new-folder-btn').addEventListener('click', async () => {
                const path = prompt("Enter new folder path:");
                if (path) {
                     await fetch(`/api/server/${serverIndex}/files/create`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ path: path, type: 'folder' })
                    });
                    location.reload(); // Simple refresh to show new folder
                }
            });

            // Initial file tree render
            renderFileTree({{ bot.files_tree | tojson }}, fileTree);


            // Console
            const consoleEl = document.getElementById('console');
            const botStatusEl = document.getElementById('bot-status-console');
            const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port + '/editor');

            socket.on('connect', () => {
                socket.emit('join', { bot_id: botId });
            });

            socket.on('log', (msg) => {
                consoleEl.innerHTML += `<div>${msg.data}</div>`;
                consoleEl.scrollTop = consoleEl.scrollHeight;
            });

            document.getElementById('start-bot-btn-console').addEventListener('click', async () => {
                await fetch(`/api/server/${serverIndex}/start`, { method: 'POST' });
                botStatusEl.textContent = 'online';
            });
            document.getElementById('stop-bot-btn-console').addEventListener('click', async () => {
                await fetch(`/api/server/${serverIndex}/stop`, { method: 'POST' });
                botStatusEl.textContent = 'offline';
            });

            // Settings
            document.getElementById('save-startup-command').addEventListener('click', async () => {
                const command = document.getElementById('startup-command-input').value;
                await fetch(`/api/server/${serverIndex}/startup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ startup_command: command })
                });
            });

            document.getElementById('install-package-btn').addEventListener('click', async () => {
                const packageName = document.getElementById('package-name-input').value;
                if (!packageName) return;
                await fetch(`/api/server/${serverIndex}/packages/install`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ package_name: packageName })
                });
                location.reload();
            });

            document.querySelectorAll('.uninstall-package-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const packageName = btn.dataset.package;
                    await fetch(`/api/server/${serverIndex}/packages/uninstall`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ package_name: packageName })
                    });
                    location.reload();
                });
            });
        });
    </script>
</body>
</html>
