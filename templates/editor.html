<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Enhanced Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 
                        0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .glass-button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .glass-button:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Normalized Mobile Header with padding */
        .header {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0 0 20px 20px;
            padding: 14px 24px; /* Increased padding */
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: calc(16px + 56px + 16px);
            right: calc(16px + 56px + 16px);
            z-index: 998;
            margin-top: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #ffffff;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* Updated file display */
        .current-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-weight: 500;
        }

        .file-path {
            color: #ffffff;
            font-weight: 600;
        }

        .file-separator {
            color: rgba(255, 255, 255, 0.4);
            margin: 0 6px;
        }

        /* Normalized Edge Buttons */
        .edge-button {
            position: fixed;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            z-index: 999;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .edge-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .edge-button:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .edge-button:disabled {
            background: rgba(255, 255, 255, 0.008);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .edge-button.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* Hide buttons when sidebar is open */
        .edge-button.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-10px);
        }

        /* Left Side - Menu button */
        .mobile-menu-btn {
            left: 16px;
            top: 16px;
        }

        /* Right Side - User Profile and Action Buttons */
        .user-profile {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .user-profile:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* User Profile Dropdown */
        .user-dropdown {
            position: fixed;
            top: calc(16px + 56px + 16px);
            right: 16px;
            width: 240px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-dropdown-header {
            padding: 12px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .user-dropdown-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .user-dropdown-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-dropdown-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .user-dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 8px 0;
        }

        /* Right side action buttons - positioned symmetrically */
        .save-btn-header {
            right: 16px;
            top: calc(16px + 56px + 16px);
        }

        .console-toggle {
            right: 16px;
            top: calc(16px + 56px + 16px + 56px + 16px);
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 96px; /* Increased from 72px to add more padding */
            overflow: hidden;
        }

        /* Enhanced Sidebar */
        .sidebar {
            position: fixed;
            top: 96px; /* Adjusted to match main-container */
            left: 0;
            width: 100%;
            height: calc(100vh - 96px); /* Adjusted height */
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 96px; /* Adjusted to match sidebar */
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 32px 28px 28px; /* Increased padding */
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0; /* Increased padding */
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 20px 28px; /* Increased padding */
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 0;
            font-weight: 500;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #ffffff;
        }

        .file-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.active {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 3px solid rgba(255, 255, 255, 0.8);
            color: #ffffff;
        }

        .file-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Mobile Tabs with padding */
        .mobile-tabs {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
            height: 52px;
            padding: 0 8px; /* Added padding */
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
            height: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px; /* Increased padding */
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            white-space: nowrap;
            min-width: 160px;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
            height: 100%;
        }

        .mobile-tab.active {
            color: #ffffff;
            border-bottom-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.025);
        }

        .mobile-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.9);
        }

        .mobile-tab:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-close {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.1);
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            background: #101010 !important;
            color: #ffffff !important;
        }

        .CodeMirror-gutters {
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .CodeMirror-linenumber {
            color: rgba(255, 255, 255, 0.4) !important;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #ffffff !important;
        }

        .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.12) !important;
        }

        /* Empty State - Moved down by 26% total (20% + 6%) */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 32px 120px;
            min-height: 0;
            transform: translateY(26%); /* Increased from 20% to 26% */
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .mobile-empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .mobile-empty-state p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            line-height: 1.5;
            max-width: 280px;
        }

        /* AI Chat Interface at Bottom - Transparent Input */
        .ai-chat-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 600;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 -8px 32px rgba(0, 0, 0, 0.15);
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-chat-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* AI Suggestions */
        .ai-suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 4px;
        }

        .suggestion-chip {
            padding: 6px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            user-select: none;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .suggestion-chip:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
        }

        /* AI Input - Transparent Background */
        .ai-input-container {
            display: flex;
            gap: 12px;
            align-items: center;
            background: transparent; /* Removed background */
            border: 1px solid rgba(255, 255, 255, 0.08); /* Only border */
            border-radius: 18px;
            padding: 10px 14px;
        }

        .ai-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            placeholder-color: rgba(255, 255, 255, 0.5);
        }

        .ai-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .ai-send-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-send-btn:hover {
            background: rgba(255, 255, 255, 0.08);

            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2),

            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;

            background: rgba(255, 255, 255, 0.04);

        }

        .console-close {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);

            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;

            border: 1px solid rgba(255, 255, 255, 0.05);
