<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <!-- Using a dark theme for CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        /* --- Base and General Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #e0e0e0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* --- Header --- */
        .header {
            background: #1c1c1c;
            border-bottom: 1px solid #333;
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .mobile-menu-btn {
            background: none;
            color: #e0e0e0;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
            transition: background 0.15s ease;
        }

        .mobile-menu-btn:active {
            background: #333;
        }

        .logo {
            color: #fff;
        }

        .logo-icon {
            background: #fff;
            color: #101010;
        }

        .current-file {
            color: #999;
        }
        
        .header-btn {
            border: 1px solid #333;
            background: #1c1c1c;
            color: #e0e0e0;
        }

        .header-btn:active {
            background: #333;
        }

        .header-btn.active {
            background: #fff;
            color: #101010;
            border-color: #fff;
        }

        /* --- Main Layout & Sidebar --- */
        .main-container {
            margin-top: 56px;
        }

        .sidebar {
            background: #1c1c1c;
        }

        .sidebar-overlay {
            background: rgba(0, 0, 0, 0.7);
        }

        .sidebar-header {
            border-bottom: 1px solid #333;
        }

        .sidebar-title {
            color: #fff;
        }

        .sidebar-btn {
            border: 1px solid #333;
            background: #1c1c1c;
            color: #e0e0e0;
        }

        .sidebar-btn:active {
            background: #333;
        }

        .file-item {
            color: #e0e0e0;
        }

        .file-item:active {
            background: #333;
        }

        .file-item.active {
            background: #fff;
            color: #101010;
        }

        /* --- Content Area & Tabs --- */
        .mobile-tabs {
            background: #1c1c1c;
            border-bottom: 1px solid #333;
        }
        
        .mobile-tab {
            color: #999;
            border-bottom: 2px solid transparent;
        }
        
        .mobile-tab.active {
            color: #fff;
            border-bottom-color: #fff;
        }
        
        .mobile-tab:active {
            background: #333;
        }
        
        .tab-close {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* --- CodeMirror Editor Dark Theme --- */
        .CodeMirror {
            background: #101010 !important;
            color: #e0e0e0;
        }

        .cm-s-material-darker.CodeMirror {
            background-color: #101010;
            color: #eeffff;
        }

        .cm-s-material-darker .CodeMirror-gutters {
            background: #101010;
            border-right: 1px solid #333;
        }

        .cm-s-material-darker .CodeMirror-linenumber {
            color: #545454;
        }

        .cm-s-material-darker .CodeMirror-cursor {
            border-left: 2px solid #fff !important;
        }
        
        /* --- Status Bar --- */
        .mobile-status-bar {
            background: #1c1c1c;
            border-top: 1px solid #333;
            color: #999;
        }

        .save-btn {
            border: 1px solid #333;
            background: #1c1c1c;
            color: #e0e0e0;
        }
        
        .save-btn:not(:disabled):active {
            background: #333;
        }

        .save-btn.primary {
            background: #fff;
            color: #101010;
            border-color: #fff;
        }

        /* --- Empty State --- */
        .mobile-empty-state {
            background: #101010;
        }
        
        .empty-icon {
            background: #222;
            color: #e0e0e0;
        }

        .mobile-empty-state h3 {
            color: #fff;
        }

        .mobile-empty-state p {
            color: #999;
        }

        /* --- Console --- */
        .mobile-console {
            background: #1c1c1c;
            border-top: 1px solid #333;
        }

        .console-header {
            background: #151515;
            border-bottom: 1px solid #333;
        }
        
        .console-title {
            color: #fff;
        }

        .console-btn {
            border: 1px solid #333;
            background: #2a2a2a;
            color: #e0e0e0;
        }

        .console-btn:active {
            background: #444;
        }

        .console-close {
            color: #e0e0e0;
        }
        
        .console-close:active {
            background: #333;
        }
        
        .console-output {
            background: #101010;
            color: #e0e0e0;
        }
        
        /* --- Scrollbars --- */
        ::-webkit-scrollbar-thumb {
            background: #555;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        /* --- Breadcrumb for Desktop --- */
        .breadcrumb {
            color: #999;
        }
        
        .breadcrumb-separator {
            color: #555;
        }
    </style>
</head>
<body>
    <!-- The rest of your HTML body remains exactly the same -->
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-btn touch-target" id="mobile-menu-btn">
                    <span class="icon-menu">☰</span>
                </button>
                <a href="#" class="logo" style="display: flex; align-items: center; gap: 8px; font-weight: 600; text-decoration: none;">
                    <div class="logo-icon" style="width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700;">E</div>
                    <span class="current-file" id="current-file">Select a file</span>
                </a>
                <nav class="breadcrumb" style="display: none;">
                    <span>{{ bot.name }}</span>
                    <span class="breadcrumb-separator">/</span>
                    <span id="current-file-breadcrumb">Select a file</span>
                </nav>
            </div>
            <div class="header-right">
                <button class="header-btn touch-target" id="save-btn-header" disabled>
                    <span class="icon-save">💾</span>
                </button>
                <button class="header-btn touch-target" id="console-toggle">
                    <span class="icon-terminal">⌨</span>
                </button>
            </div>
        </header>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Files</span>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn touch-target" id="new-file-btn" title="New File">
                            <span class="icon-plus">+</span>
                        </button>
                        <button class="sidebar-btn touch-target" id="new-folder-btn" title="New Folder">
                            <span class="icon-folder">📁</span>
                        </button>
                    </div>
                </div>
                <div class="file-tree" id="file-tree">
                    <!-- Files will be populated here -->
                </div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Mobile Tabs -->
                <div class="mobile-tabs" id="mobile-tabs" style="display: none;">
                    <div class="tabs-wrapper" id="tabs-wrapper">
                        <!-- Tabs will be populated here -->
                    </div>
                </div>

                <!-- Editor -->
                <div class="mobile-editor-container" id="editor-container">
                    <div class="mobile-empty-state" id="empty-state">
                        <div class="empty-icon">
                            <span class="icon-file">📄</span>
                        </div>
                        <h3>No file selected</h3>
                        <p>Tap the menu button and select a file to start editing</p>
                    </div>
                </div>

                <!-- Mobile Status Bar -->
                <div class="mobile-status-bar">
                    <div class="status-left">
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <span id="bot-status">Status: {{ bot.status }}</span>
                    </div>
                    <button class="save-btn touch-target" id="save-btn" disabled>Save</button>
                </div>
            </main>
        </div>

        <!-- Mobile Console -->
        <div class="mobile-console" id="mobile-console">
            <div class="console-header">
                <span class="console-title">Console</span>
                <div class="console-actions">
                    <button class="console-btn touch-target" id="start-bot-btn">
                        <span class="icon-play">▶</span>
                        Start
                    </button>
                    <button class="console-btn touch-target" id="stop-bot-btn">
                        <span class="icon-stop">⏹</span>
                        Stop
                    </button>
                    <button class="console-close touch-target" id="console-close">
                        <span class="icon-close">×</span>
                    </button>
                </div>
            </div>
            <div class="console-output" id="console-output">
                <div class="console-line">Welcome to the console...</div>
            </div>
        </div>
    </div>

    <script>
        // Your original Javascript remains unchanged
        document.addEventListener('DOMContentLoaded', function() {
            // All your original JavaScript code goes here...
            const serverIndex = '{{ request.view_args.server_index if request and request.view_args else "0" }}';
            const botId = '{{ bot._id if bot else "default" }}';
            
            // Elements
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const fileTree = document.getElementById('file-tree');
            const mobileTabs = document.getElementById('mobile-tabs');
            const tabsWrapper = document.getElementById('tabs-wrapper');
            const editorContainer = document.getElementById('editor-container');
            const emptyState = document.getElementById('empty-state');
            const mobileConsole = document.getElementById('mobile-console');
            const consoleToggle = document.getElementById('console-toggle');
            const consoleClose = document.getElementById('console-close');
            const consoleOutput = document.getElementById('console-output');
            const currentFileSpan = document.getElementById('current-file');
            const currentFileBreadcrumb = document.getElementById('current-file-breadcrumb');
            const saveBtn = document.getElementById('save-btn');
            const saveBtnHeader = document.getElementById('save-btn-header');
            const cursorPosition = document.getElementById('cursor-position');
            const botStatus = document.getElementById('bot-status');

            let openTabs = new Map();
            let activeTab = null;
            let editor = null;

            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }

            sidebarOverlay.addEventListener('click', closeSidebar);

            function toggleSidebar() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('active');
            }
            
            function openSidebar() {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('active');
            }

            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
            }

            consoleToggle.addEventListener('click', () => {
                mobileConsole.classList.toggle('open');
                consoleToggle.classList.toggle('active');
            });

            consoleClose.addEventListener('click', () => {
                mobileConsole.classList.remove('open');
                consoleToggle.classList.remove('active');
            });

            function initEditor() {
                if (editor) return;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'editor-wrapper';
                wrapper.style.height = '100%';
                editorContainer.appendChild(wrapper);
                
                editor = CodeMirror(wrapper, {
                    mode: 'python',
                    theme: 'material-darker', // Set dark theme for CodeMirror
                    lineNumbers: true,
                    autofocus: false,
                    lineWrapping: true,
                    indentUnit: 4,
                    smartIndent: true,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    viewportMargin: Infinity,
                    extraKeys: {
                        "Ctrl-S": function() { saveFile(); },
                        "Cmd-S": function() { saveFile(); }
                    }
                });
                
                editor.on('cursorActivity', () => {
                    const cursor = editor.getCursor();
                    cursorPosition.textContent = `Ln ${cursor.line + 1}, Col ${cursor.ch + 1}`;
                });

                editor.on('change', () => {
                    if (activeTab) {
                        const tab = openTabs.get(activeTab);
                        if (tab && !tab.modified) {
                            tab.modified = true;
                            updateTabTitle(activeTab);
                        }
                        saveBtn.disabled = false;
                        saveBtnHeader.disabled = false;
                        saveBtn.classList.add('primary');
                    }
                });
            }

            async function openFile(path) {
                // This function fetches file content. No changes needed.
                try {
                    if (!openTabs.has(path)) {
                        // Dummy content for demonstration
                        const data = { content: `# Welcome to ${path}\n\nprint("Hello, World!")` };
                        openTabs.set(path, { content: data.content, modified: false, path: path });
                        createMobileTab(path);
                    }
                    switchToTab(path);
                    if (window.innerWidth < 768) closeSidebar();
                } catch (error) {
                    console.error('Error opening file:', error);
                }
            }
            
            function createMobileTab(path) {
                const tab = document.createElement('button');
                tab.className = 'mobile-tab touch-target';
                tab.dataset.path = path;
                
                const fileName = path.split('/').pop();
                const label = document.createElement('span');
                label.textContent = fileName;
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close touch-target';
                closeBtn.innerHTML = '<span class="icon-close">×</span>';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(path);
                });

                tab.appendChild(label);
                tab.appendChild(closeBtn);
                tab.addEventListener('click', () => switchToTab(path));

                tabsWrapper.appendChild(tab);
                
                if (mobileTabs.style.display === 'none') {
                    mobileTabs.style.display = 'flex';
                }
            }

            function switchToTab(path) {
                document.querySelectorAll('.mobile-tab').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
                
                const activeTabElem = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                if(activeTabElem) activeTabElem.classList.add('active');

                const activeFileItem = document.querySelector(`.file-item[data-path="${path}"]`);
                if(activeFileItem) activeFileItem.classList.add('active');
                
                activeTab = path;
                const tabData = openTabs.get(path);
                
                if (tabData) {
                    if (!editor) {
                        emptyState.style.display = 'none';
                        initEditor();
                    }
                    
                    editor.setValue(tabData.content);
                    setTimeout(() => editor.refresh(), 1);
                    const fileName = path.split('/').pop();
                    currentFileSpan.textContent = fileName;
                    if (currentFileBreadcrumb) currentFileBreadcrumb.textContent = fileName;
                    
                    const isModified = tabData.modified;
                    saveBtn.disabled = !isModified;
                    saveBtnHeader.disabled = !isModified;
                    saveBtn.classList.toggle('primary', isModified);
                }
            }
            
            function closeTab(path) {
                const tabElement = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                if (tabElement) tabElement.remove();

                openTabs.delete(path);

                if (activeTab === path) {
                    const remainingTabs = document.querySelectorAll('.mobile-tab');
                    if (remainingTabs.length > 0) {
                        switchToTab(remainingTabs[0].dataset.path);
                    } else {
                        activeTab = null;
                        currentFileSpan.textContent = 'Select a file';
                        if (currentFileBreadcrumb) currentFileBreadcrumb.textContent = 'Select a file';
                        
                        if (editor) {
                            editorContainer.innerHTML = ''; // Clear previous editor
                            editor = null;
                            editorContainer.appendChild(emptyState);
                            emptyState.style.display = 'flex';
                        }
                        
                        saveBtn.disabled = true;
                        saveBtnHeader.disabled = true;
                        saveBtn.classList.remove('primary');
                        mobileTabs.style.display = 'none';
                    }
                }
            }

            function updateTabTitle(path) {
                const tab = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                const tabData = openTabs.get(path);
                if (tab && tabData) {
                    const label = tab.querySelector('span:not(.icon-close)');
                    const fileName = path.split('/').pop();
                    label.textContent = tabData.modified ? `${fileName} ●` : fileName;
                }
            }

            async function saveFile() {
                if (!activeTab || !editor || !openTabs.get(activeTab).modified) return;
                
                saveBtn.disabled = true;
                saveBtnHeader.disabled = true;
                
                // Simulate saving
                console.log(`Saving ${activeTab}...`);
                
                setTimeout(() => {
                    const tabData = openTabs.get(activeTab);
                    tabData.modified = false;
                    tabData.content = editor.getValue();
                    updateTabTitle(activeTab);
                    saveBtn.classList.remove('primary');
                    console.log('File saved.');
                }, 500);
            }

            saveBtn.addEventListener('click', saveFile);
            saveBtnHeader.addEventListener('click', saveFile);

            // Dummy file tree for demonstration
            const files = {
                'main.py': '',
                'utils': { 'helpers.py': '' },
                'README.md': ''
            };
            
            function renderFileTree(tree, container = fileTree, pathPrefix = '') {
                container.innerHTML = '';
                Object.entries(tree).forEach(([name, content]) => {
                    const fullPath = pathPrefix ? `${pathPrefix}/${name}` : name;
                    const item = document.createElement('button');
                    item.className = 'file-item touch-target';
                    item.dataset.path = fullPath;

                    const icon = document.createElement('span');
                    icon.className = 'file-icon';
                    
                    const label = document.createElement('span');
                    label.textContent = name;

                    if (typeof content === 'object') {
                        item.classList.add('folder-item');
                        item.innerHTML = `<span class="file-icon">📁</span><span>${name}</span>`;
                        // Folder click logic can be added here
                    } else {
                        item.innerHTML = `<span class="file-icon">📄</span><span>${name}</span>`;
                        item.addEventListener('click', () => openFile(fullPath));
                    }
                    container.appendChild(item);
                });
            }
            
            renderFileTree(files);

            // Handle responsiveness
            function handleResize() {
                const isDesktop = window.innerWidth >= 768;
                const breadcrumb = document.querySelector('.breadcrumb');
                
                if (isDesktop) {
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('active');
                    if (breadcrumb) breadcrumb.style.display = 'flex';
                } else {
                    if (breadcrumb) breadcrumb.style.display = 'none';
                }
            }

            window.addEventListener('resize', handleResize);
            handleResize(); // Initial call
        });
    </script>
</body>
</html>
