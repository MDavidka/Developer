<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Enhanced Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 
                        0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .glass-button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .glass-button:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Normalized Mobile Header with padding */
        .header {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0 0 20px 20px;
            padding: 14px 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: calc(16px + 56px + 16px);
            right: calc(16px + 56px + 16px);
            z-index: 998;
            margin-top: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #ffffff;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* Updated file display */
        .current-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-weight: 500;
        }

        .file-path {
            color: #ffffff;
            font-weight: 600;
        }

        .file-separator {
            color: rgba(255, 255, 255, 0.4);
            margin: 0 6px;
        }

        /* Focus Mode Toggle in Header */
        .focus-toggle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .focus-toggle:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .focus-toggle:active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
        }

        .focus-toggle.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Normalized Edge Buttons */
        .edge-button {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .edge-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .edge-button:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .edge-button:disabled {
            background: rgba(255, 255, 255, 0.008);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .edge-button.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* Console Status Dot - Fixed positioning */
        .console-status-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b35; /* Orange by default */
            right: 6px;
            bottom: 6px;
            z-index: 1001;
            transition: all 0.3s ease;
            box-shadow: 0 0 0 2px #101010;
        }

        .console-status-dot.connected {
            background: #4ade80; /* Green when bot started */
        }

        .console-status-dot.idle {
            background: #6b7280; /* Gray when idle */
        }

        /* Action Buttons Container - Collapsible */
        .action-buttons-container {
            position: fixed;
            right: 16px;
            top: calc(16px + 56px + 16px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-buttons-toggle {
            width: 56px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .action-buttons-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .action-buttons-toggle.collapsed {
            transform: rotate(180deg);
        }

        .action-buttons-toggle.collapsed:hover {
            transform: translateY(-1px) rotate(180deg);
        }

        .action-buttons-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top center;
        }

        .action-buttons-list.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-20px) scaleY(0.8);
            pointer-events: none;
        }

        /* Hide buttons when sidebar is open */
        .action-buttons-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-10px);
        }

        /* Left Side - Menu button */
        .mobile-menu-btn {
            position: fixed;
            left: 16px;
            top: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            z-index: 999;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .mobile-menu-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .mobile-menu-btn:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* Right Side - User Profile */
        .user-profile {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .user-profile:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* User Profile Dropdown */
        .user-dropdown {
            position: fixed;
            top: calc(16px + 56px + 16px);
            right: 16px;
            width: 240px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-dropdown-header {
            padding: 12px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .user-dropdown-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .user-dropdown-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-dropdown-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .user-dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 8px 0;
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 96px;
            overflow: hidden;
        }

        /* Enhanced Sidebar */
        .sidebar {
            position: fixed;
            top: 96px;
            left: 0;
            width: 100%;
            height: calc(100vh - 96px);
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 96px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 32px 28px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 20px 28px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 0;
            font-weight: 500;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #ffffff;
        }

        .file-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.active {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 3px solid rgba(255, 255, 255, 0.8);
            color: #ffffff;
        }

        .file-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Mobile Tabs - Desktop vs Mobile behavior */
        .mobile-tabs {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
            height: 52px;
            padding: 0 8px;
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
            height: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            white-space: nowrap;
            min-width: 160px;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
            height: 100%;
        }

        .mobile-tab.active {
            color: #ffffff;
            border-bottom-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.025);
        }

        .mobile-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.9);
        }

        .mobile-tab:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-close {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.1);
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            background: #101010 !important;
            color: #ffffff !important;
        }

        .CodeMirror-gutters {
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .CodeMirror-linenumber {
            color: rgba(255, 255, 255, 0.4) !important;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #ffffff !important;
        }

        .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.12) !important;
        }

        /* Empty State */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 32px 120px;
            min-height: 0;
            transform: translateY(26%);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .mobile-empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .mobile-empty-state p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            line-height: 1.5;
            max-width: 280px;
        }

        /* AI Chat Interface at Bottom */
        .ai-chat-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 600;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),

            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);

        .ai-chat-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* AI Suggestions */
        .ai-suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 4px;
        }

        .suggestion-chip {
            padding: 6px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            user-select: none;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .suggestion-chip:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
        }

        /* AI Input */
        .ai-input-container {
            display: flex;
            gap: 12px;
            align-items: center;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 10px 14px;
        }

        .ai-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            placeholder-color: rgba(255, 255, 255, 0.5);
        }

        .ai-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .ai-send-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-send-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .ai-send-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(0);
        }

        .ai-send-btn:disabled {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Enhanced Status Bar */
        .mobile-status-bar {
            height: 50px;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .save-btn {
            padding: 10px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .save-btn:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.02);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }

        .save-btn:not(:disabled):hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .save-btn:not(:disabled):active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .save-btn.primary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .save-btn.primary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* Enhanced Mobile Console */
        .mobile-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55vh;
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .mobile-console.open {
            transform: translateY(0);
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .console-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .console-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .console-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 16px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .console-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .console-btn:active {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .console-btn:disabled {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .console-btn.running {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .console-close {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .console-close:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: scale(1.05);
        }

        .console-close:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.95);
        }

        .console-output {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: rgba(16, 16, 16, 0.3);
            -webkit-overflow-scrolling: touch;
            color: rgba(255, 255, 255, 0.9);
        }

        .console-line {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding: 3px 0;
            opacity: 0.9;
        }

        .console-line.error {
            opacity: 1;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
        }

        .console-line.warning {
            opacity: 0.8;
            font-weight: 500;
        }

        .console-line.success {
            opacity: 1;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
        }

        .console-line.info {
            opacity: 0.7;
        }

        /* Focus Mode - File Editor View */
        body.focus-mode .action-buttons-container,
        body.focus-mode .ai-chat-container,
        body.focus-mode .mobile-status-bar {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(20px);
        }

        body.focus-mode .content-area {
            height: calc(100vh - 96px);
        }

        body.focus-mode .mobile-editor-container {
            height: 100%;
        }

        body.focus-mode .mobile-console {
            bottom: 0;
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .header {
                height: 64px;
                padding: 18px 28px;
                left: calc(16px + 56px + 16px);
                right: calc(16px + 56px + 16px);
                border-radius: 0 0 24px 24px;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .current-file {
                font-size: 16px;
            }

            .main-container {
                margin-top: 104px;
                flex-direction: row;
            }

            .sidebar {
                position: relative;
                top: 0;
                width: 320px;
                height: 100%;
                transform: translateX(0);
                transition: none;
                border-right: 1px solid rgba(255, 255, 255, 0.04);
            }

            .sidebar-overlay {
                display: none;
            }

            .mobile-menu-btn {
                display: none;
            }

            .mobile-tabs {
                display: flex;
                padding: 0 12px;
            }

            /* Desktop: Multiple tabs allowed */
            .mobile-tab {
                min-width: 180px;
                max-width: 240px;
                flex-shrink: 1;
            }

            .mobile-console {
                height: 360px;
            }

            .console-actions {
                gap: 16px;
            }

            .console-btn {
                width: 48px;
                height: 48px;
            }

            .empty-icon {
                width: 120px;
                height: 120px;
            }

            .mobile-empty-state h3 {
                font-size: 28px;
            }

            .mobile-empty-state p {
                font-size: 18px;
                max-width: 440px;
            }

            .mobile-empty-state {
                padding: 48px 32px 160px;
            }

            .user-dropdown {
                top: calc(16px + 56px + 16px);
            }

            /* Don't hide buttons on desktop */
            .action-buttons-container.hidden {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
                transform: none;
            }

            /* AI Chat responsive */
            .ai-chat-container {
                padding: 20px 30px;
                gap: 16px;
            }

            .ai-suggestions {
                justify-content: flex-start;
                gap: 12px;
            }

            .suggestion-chip {
                padding: 8px 16px;
                font-size: 13px;
            }

            .ai-input-container {
                padding: 12px 16px;
                border-radius: 20px;
            }

            .ai-input {
                font-size: 15px;
            }

            .ai-send-btn {
                width: 36px;
                height: 36px;
                border-radius: 12px;
                font-size: 16px;
            }

            .mobile-status-bar {
                height: 60px;
            }

            .save-btn {
                padding: 12px 24px;
                font-size: 15px;
            }
        }

        /* Mobile: Single tab only */
        @media (max-width: 767px) {
            .mobile-tabs {
                overflow: hidden;
            }
            
            .tabs-wrapper {
                width: 100%;
            }
            
            .mobile-tab {
                flex: 1;
                min-width: 0;
                max-width: none;
            }
            
            .mobile-tab:not(.active) {
                display: none;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .sidebar {
                width: 360px;
            }

            .mobile-console {
                height: 420px;
            }
        }

        /* Status indicators */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-indicator.online {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .status-indicator.offline {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            opacity: 0.6;
        }

        .status-indicator.running {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Touch optimizations */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* Enhanced Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

                    Console
                </div>
                <div class="console-actions">
                    <button class="console-btn" id="runBtn">
                        <i data-lucide="play"></i>
                    </button>
                    <button class="console-btn" id="stopBtn" disabled>
                        <i data-lucide="square"></i>
                    </button>
                    <button class="console-btn" id="clearBtn">
                        <i data-lucide="trash-2"></i>
                    </button>
                    <button class="console-close" id="consoleClose">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>
            <div class="console-output" id="consoleOutput">
                <div class="console-line info">Console ready. Run your code to see output.</div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Global state
        let editor = null;
        let currentFile = null;
        let consoleOpen = false;
        let sidebarOpen = false;
        let userDropdownOpen = false;
        let actionButtonsCollapsed = false;
        let focusMode = false;

        // DOM elements
        const elements = {
            mobileMenuBtn: document.getElementById('mobileMenuBtn'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            userProfile: document.getElementById('userProfile'),
            userDropdown: document.getElementById('userDropdown'),
            actionButtonsContainer: document.getElementById('actionButtonsContainer'),
            actionButtonsToggle: document.getElementById('actionButtonsToggle'),
            actionButtonsList: document.getElementById('actionButtonsList'),
            consoleToggle: document.getElementById('consoleToggle'),
            consoleStatusDot: document.getElementById('consoleStatusDot'),
            mobileConsole: document.getElementById('mobileConsole'),
            consoleClose: document.getElementById('consoleClose'),
            focusToggle: document.getElementById('focusToggle'),
            aiChatContainer: document.getElementById('aiChatContainer'),
            statusBar: document.getElementById('statusBar'),
            mobileTabs: document.getElementById('mobileTabs'),
            emptyState: document.getElementById('emptyState'),
            editorWrapper: document.getElementById('editorWrapper')
        };

        // Initialize CodeMirror
        function initializeEditor() {
            if (elements.editorWrapper && !editor) {
                editor = CodeMirror(elements.editorWrapper, {
                    mode: 'python',
                    theme: 'material-darker',
                    lineNumbers: true,
                    lineWrapping: false,
                    indentUnit: 4,
                    tabSize: 4,
                    indentWithTabs: false,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    foldGutter: true,
                    gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
                    value: '# Welcome to Code Editor\nprint("Hello, World!")\n\n# Start coding here...'
                });

                // Show editor and hide empty state
                elements.emptyState.style.display = 'none';
                elements.editorWrapper.style.display = 'block';
                elements.mobileTabs.style.display = 'flex';
            }
        }

        // Console status management
        function updateConsoleStatus(status) {
            if (elements.consoleStatusDot) {
                elements.consoleStatusDot.className = `console-status-dot ${status}`;
            }
        }

        // Mobile menu toggle
        elements.mobileMenuBtn.addEventListener('click', function() {
            sidebarOpen = !sidebarOpen;
            elements.sidebar.classList.toggle('open', sidebarOpen);
            elements.sidebarOverlay.classList.toggle('active', sidebarOpen);
            elements.actionButtonsContainer.classList.toggle('hidden', sidebarOpen);
        });

        // Sidebar overlay click
        elements.sidebarOverlay.addEventListener('click', function() {
            sidebarOpen = false;
            elements.sidebar.classList.remove('open');
            elements.sidebarOverlay.classList.remove('active');
            elements.actionButtonsContainer.classList.remove('hidden');
        });

        // User profile dropdown
        elements.userProfile.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdownOpen = !userDropdownOpen;
            elements.userDropdown.classList.toggle('active', userDropdownOpen);
        });

        // Close user dropdown on outside click
        document.addEventListener('click', function() {
            if (userDropdownOpen) {
                userDropdownOpen = false;
                elements.userDropdown.classList.remove('active');
            }
        });

        // Action buttons toggle
        elements.actionButtonsToggle.addEventListener('click', function() {
            actionButtonsCollapsed = !actionButtonsCollapsed;
            elements.actionButtonsToggle.classList.toggle('collapsed', actionButtonsCollapsed);
            elements.actionButtonsList.classList.toggle('hidden', actionButtonsCollapsed);
        });

        // Console toggle
        elements.consoleToggle.addEventListener('click', function() {
            consoleOpen = !consoleOpen;
            elements.mobileConsole.classList.toggle('open', consoleOpen);
            elements.consoleToggle.classList.toggle('active', consoleOpen);
        });

        // Console close
        elements.consoleClose.addEventListener('click', function() {
            consoleOpen = false;
            elements.mobileConsole.classList.remove('open');
            elements.consoleToggle.classList.remove('active');
        });

        // Focus mode toggle
        elements.focusToggle.addEventListener('click', function() {
            focusMode = !focusMode;
            document.body.classList.toggle('focus-mode', focusMode);
            elements.focusToggle.classList.toggle('active', focusMode);
            
            // Update focus toggle icon
            const icon = elements.focusToggle.querySelector('i');
            if (focusMode) {
                icon.setAttribute('data-lucide', 'minimize');
            } else {
                icon.setAttribute('data-lucide', 'maximize');
            }
            lucide.createIcons();
        });

        // File item clicks
        document.querySelectorAll('.file-item').forEach(item => {
            item.addEventListener('click', function() {
                // Remove active class from all items
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
                // Add active class to clicked item
                this.classList.add('active');
                
                // Initialize editor if not already done
                if (!editor) {
                    initializeEditor();
                }
                
                // Close sidebar on mobile
                if (window.innerWidth < 768) {
                    sidebarOpen = false;
                    elements.sidebar.classList.remove('open');
                    elements.sidebarOverlay.classList.remove('active');
                    elements.actionButtonsContainer.classList.remove('hidden');
                }
            });
        });

        // Simulate console status changes
        setTimeout(() => {
            updateConsoleStatus('connected');
        }, 2000);

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            
            // Show tabs on desktop
            if (window.innerWidth >= 768) {
                elements.mobileTabs.style.display = 'flex';
            }
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth >= 768) {
                // Desktop: show sidebar, hide mobile menu
                elements.sidebar.classList.remove('open');
                elements.sidebarOverlay.classList.remove('active');
                elements.actionButtonsContainer.classList.remove('hidden');
                sidebarOpen = false;
                
                // Show all tabs on desktop
                document.querySelectorAll('.mobile-tab').forEach(tab => {
                    tab.style.display = 'inline-flex';
                });
            } else {
                // Mobile: hide non-active tabs
                document.querySelectorAll('.mobile-tab:not(.active)').forEach(tab => {
                    tab.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
