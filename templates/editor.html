<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Enhanced Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 
                        0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .glass-button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .glass-button:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Perfect Header Symmetry with Enhanced Glass */
        .header {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0 0 24px 24px;
            padding: 12px 20px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: calc(16px + 56px + 16px);
            right: calc(16px + 56px + 16px);
            z-index: 998;
            margin-top: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #ffffff;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* Updated file display */
        .current-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-weight: 500;
        }

        .file-path {
            color: #ffffff;
            font-weight: 600;
        }

        .file-separator {
            color: rgba(255, 255, 255, 0.4);
            margin: 0 6px;
        }

        /* Perfect Button Symmetry - Reduced Light */
        .edge-button {
            position: fixed;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            z-index: 999;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .edge-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .edge-button:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .edge-button:disabled {
            background: rgba(255, 255, 255, 0.008);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .edge-button.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* Left Side - Menu button only */
        .mobile-menu-btn {
            left: 16px;
            top: 16px;
        }

        /* Right Side - User Profile and Action Buttons (perfectly symmetric) */
        .user-profile {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .user-profile:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* User Profile Dropdown */
        .user-dropdown {
            position: fixed;
            top: calc(16px + 56px + 16px);
            right: 16px;
            width: 240px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-dropdown-header {
            padding: 12px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .user-dropdown-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .user-dropdown-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-dropdown-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .user-dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
            margin: 8px 0;
        }

        /* Consistent 16px gaps between all right-side elements */
        .save-btn-header {
            right: 16px;
            top: calc(16px + 56px + 16px);
        }

        .console-toggle {
            right: 16px;
            top: calc(16px + 56px + 16px + 56px + 16px);
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 64px;
            overflow: hidden;
        }

        /* Enhanced Sidebar */
        .sidebar {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 28px 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 0;
            font-weight: 500;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #ffffff;
        }

        .file-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.active {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 3px solid #ffffff;
            color: #ffffff;
        }

        .file-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        /* Mobile Tabs */
        .mobile-tabs {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
            height: 52px;
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
            height: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 28px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            white-space: nowrap;
            min-width: 160px;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
            height: 100%;
        }

        .mobile-tab.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
            background: rgba(255, 255, 255, 0.025);
        }

        .mobile-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: #ffffff;
        }

        .mobile-tab:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-close {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.1);
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.95);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            background: #101010 !important;
            color: #ffffff !important;
        }

        .CodeMirror-gutters {
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .CodeMirror-linenumber {
            color: rgba(255, 255, 255, 0.4) !important;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #ffffff !important;
        }

        .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.12) !important;
        }

        /* Empty State - Moved down slightly */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 32px 120px;
            min-height: 0;
        }

        .empty-icon {
            width: 96px;
            height: 96px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            color: rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .mobile-empty-state h3 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .mobile-empty-state p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 17px;
            line-height: 1.5;
            max-width: 320px;
        }

        /* Enhanced Mobile Status Bar */
        .mobile-status-bar {
            height: 60px;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .save-btn {
            padding: 12px 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .save-btn:disabled {
            background: rgba(255, 255, 255, 0.008);
            border-color: rgba(255, 255, 255, 0.02);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }

        .save-btn:not(:disabled):hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .save-btn:not(:disabled):active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .save-btn.primary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .save-btn.primary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* Enhanced Mobile Console */
        .mobile-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55vh;
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .mobile-console.open {
            transform: translateY(0);
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .console-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .console-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Reduced Light Console Buttons */
        .console-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 16px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .console-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .console-btn:active {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .console-btn:disabled {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .console-btn.running {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .console-close {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .console-close:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: scale(1.05);
        }

        .console-close:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.95);
        }

        .console-output {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: rgba(16, 16, 16, 0.4);
            -webkit-overflow-scrolling: touch;
            color: #ffffff;
        }

        .console-line {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding: 3px 0;
            opacity: 0.9;
        }

        .console-line.error {
            opacity: 1;
            font-weight: 500;
        }

        .console-line.warning {
            opacity: 0.8;
            font-weight: 500;
        }

        .console-line.success {
            opacity: 1;
            font-weight: 500;
        }

        .console-line.info {
            opacity: 0.7;
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .header {
                height: 56px;
                padding: 16px 24px;
                left: calc(16px + 56px + 16px);
                right: calc(16px + 56px + 16px);
            }

            .main-container {
                margin-top: 72px;
                flex-direction: row;
            }

            .sidebar {
                position: relative;
                top: 0;
                width: 320px;
                height: 100%;
                transform: translateX(0);
                transition: none;
                border-right: 1px solid rgba(255, 255, 255, 0.04);
            }

            .sidebar-overlay {
                display: none;
            }

            .mobile-menu-btn {
                display: none;
            }

            .mobile-tabs {
                display: flex;
            }

            .mobile-console {
                height: 360px;
            }

            .current-file {
                font-size: 15px;
            }

            .console-actions {
                gap: 16px;
            }

            .console-btn {
                width: 48px;
                height: 48px;
            }

            .empty-icon {
                width: 120px;
                height: 120px;
            }

            .mobile-empty-state h3 {
                font-size: 28px;
            }

            .mobile-empty-state p {
                font-size: 18px;
                max-width: 440px;
            }

            .mobile-empty-state {
                padding: 48px 32px 160px;
            }

            /* Desktop symmetrical positioning */
            .save-btn-header {
                top: calc(16px + 56px + 16px);
            }

            .console-toggle {
                top: calc(16px + 56px + 16px + 56px + 16px);
            }

            .user-dropdown {
                top: calc(16px + 56px + 16px);
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .sidebar {
                width: 360px;
            }

            .mobile-console {
                height: 420px;
            }
        }

        /* Status indicators */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-indicator.online {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .status-indicator.offline {
            background: rgba(255, 255, 255, 0.015);
            border-color: rgba(255, 255, 255, 0.03);
            opacity: 0.6;
        }

        .status-indicator.running {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Touch optimizations */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* Enhanced Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.005);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* Mobile scrollbars */
        @media (max-width: 767px) {
            ::-webkit-scrollbar {
                width: 3px;
                height: 3px;
            }
        }

        /* Enhanced Context Menu */
        .context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1000;
            min-width: 200px;
        }

        .context-menu-item {
            padding: 16px 24px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-size: 15px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .context-menu-item:disabled {
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
        }

        .context-menu-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
            margin: 12px 0;
        }

        /* Spinner animation */
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Enhanced Selection colors */
        ::selection {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        ::-moz-selection {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Landscape orientation adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            .header {
                height: 40px;
                margin-top: 4px;
            }
            
            .main-container {
                margin-top: 52px;
            }
            
            .sidebar {
                top: 52px;
                height: calc(100vh - 52px);
            }
            
            .sidebar-overlay {
                top: 52px;
            }
            
            .mobile-console {
                height: 65vh;
            }
            
            .file-item {
                padding: 12px 24px;
                min-height: 44px;
            }
            
            .mobile-tab {
                padding: 12px 20px;
            }

            .console-actions {
                gap: 8px;
            }

            .console-btn {
                width: 40px;
                height: 40px;
            }

            .save-btn-header {
                top: calc(16px + 56px + 12px);
            }

            .console-toggle {
                top: calc(16px + 56px + 12px + 56px + 12px);
            }

            .user-dropdown {
                top: calc(16px + 56px + 12px);
            }
        }

        /* iOS safe area support */
        @supports (padding: max(0px)) {
            .app-container {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
            
            .mobile-console {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Symmetrical Header with Enhanced Glass -->
        <header class="header">
            <a href="#" class="logo">
                <div class="logo-icon">E</div>
                <span class="current-file" id="current-file">
                    <span class="file-path">Editor</span>
                    <span class="file-separator">/</span>
                    <span id="current-file-name">Select a file</span>
                </span>
            </a>
        </header>

        <!-- Left Side: Menu Button -->
        <button class="edge-button glass-button mobile-menu-btn touch-target" id="mobile-menu-btn" title="Menu">
            <i data-lucide="menu"></i>
        </button>
        
        <!-- Right Side: User Profile -->
        <div class="user-profile touch-target" id="user-profile" title="User Profile">
            <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="user-avatar">
        </div>

        <!-- User Dropdown -->
        <div class="user-dropdown" id="user-dropdown">
            <div class="user-dropdown-header">
                <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="user-dropdown-avatar">
                <div class="user-dropdown-info">
                    <h3>{{ user.username or 'User' }}</h3>
                    <p>Developer</p>
                </div>
            </div>
            <a href="{{ url_for('dashboard') if url_for else '#' }}" class="user-dropdown-item">
                <i data-lucide="layout-dashboard" size="16"></i>
                Dashboard
            </a>
            <a href="https://sycord.com" class="user-dropdown-item">
                <i data-lucide="external-link" size="16"></i>
                Sycord.com
            </a>
            <div class="user-dropdown-separator"></div>
            <a href="{{ url_for('logout') if url_for else '#' }}" class="user-dropdown-item">
                <i data-lucide="log-out" size="16"></i>
                Logout
            </a>
        </div>
        
        <!-- Right Side Action Buttons - Perfect Symmetry -->
        <button class="edge-button glass-button save-btn-header touch-target" id="save-btn-header" disabled title="Save File">
            <i data-lucide="save"></i>
        </button>
        
        <button class="edge-button glass-button console-toggle touch-target" id="console-toggle" title="Toggle Console">
            <i data-lucide="terminal"></i>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Enhanced Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">
                        <i data-lucide="folder-open"></i>
                        Files
                    </div>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn glass-button touch-target" id="new-file-btn" title="New File">
                            <i data-lucide="file-plus"></i>
                        </button>
                        <button class="sidebar-btn glass-button touch-target" id="new-folder-btn" title="New Folder">
                            <i data-lucide="folder-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="file-tree" id="file-tree">
                    <!-- Files will be populated here -->
                </div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Mobile Tabs -->
                <div class="mobile-tabs" id="mobile-tabs">
                    <div class="tabs-wrapper" id="tabs-wrapper">
                        <!-- Tabs will be populated here -->
                    </div>
                </div>

                <!-- Editor -->
                <div class="mobile-editor-container" id="editor-container">
                    <div class="mobile-empty-state" id="empty-state">
                        <div class="empty-icon">
                            <i data-lucide="file-text" size="36"></i>
                        </div>
                        <h3>Select a file to edit</h3>
                        <p>Choose a file from the sidebar to start editing your code</p>
                    </div>
                </div>

                <!-- Enhanced Mobile Status Bar -->
                <div class="mobile-status-bar">
                    <div class="status-left">
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <div class="status-indicator offline" id="bot-status">
                            <div class="status-dot"></div>
                            <span>Offline</span>
                        </div>
                    </div>
                    <button class="save-btn glass-button touch-target" id="save-btn" disabled>
                        <i data-lucide="save" size="16"></i>
                        Save
                    </button>
                </div>
            </main>
        </div>

        <!-- Enhanced Mobile Console -->
        <div class="mobile-console" id="mobile-console">
            <div class="console-header">
                <div class="console-title">
                    <i data-lucide="terminal" size="20"></i>
                    Console
                </div>
                <div class="console-actions">
                    <!-- Reduced Light Console Buttons -->
                    <button class="console-btn touch-target" id="start-bot-btn" title="Start Bot">
                        <i data-lucide="play" size="18"></i>
                    </button>
                    <button class="console-btn touch-target" id="stop-bot-btn" disabled style="display: none;" title="Stop Bot">
                        <i data-lucide="square" size="16"></i>
                    </button>
                    <button class="console-btn touch-target" id="restart-bot-btn" disabled style="display: none;" title="Restart Bot">
                        <i data-lucide="rotate-cw" size="16"></i>
                    </button>
                    <button class="console-btn touch-target" id="clear-console-btn" title="Clear Console">
                        <i data-lucide="trash-2" size="16"></i>
                    </button>
                    <button class="console-close touch-target" id="console-close">
                        <i data-lucide="x" size="20"></i>
                    </button>
                </div>
            </div>
            <div class="console-output" id="console-output">
                <div class="console-line">Welcome to the console...</div>
                <div class="console-line">Bot status: <span id="console-bot-status">Stopped</span></div>
            </div>
        </div>
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
