<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #fafafa;
            color: #000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Header */
        .header {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .mobile-menu-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
            flex-shrink: 0;
            transition: background 0.15s ease;
        }

        .mobile-menu-btn:active {
            background: #f5f5f5;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #000;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }

        .current-file {
            color: #666;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #eaeaea;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s ease;
        }

        .header-btn:active {
            background: #f5f5f5;
            transform: scale(0.95);
        }

        .header-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .header-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 56px;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            width: 100%;
            height: calc(100vh - 56px);
            background: #fff;
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            color: #000;
        }

        .sidebar-actions {
            display: flex;
            gap: 8px;
        }

        .sidebar-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #eaeaea;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.15s ease;
        }

        .sidebar-btn:active {
            background: #f5f5f5;
            transform: scale(0.95);
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 12px;
            transition: background 0.15s ease;
            min-height: 52px;
        }

        .file-item:active {
            background: #f5f5f5;
        }

        .file-item.active {
            background: #000;
            color: #fff;
        }

        .file-icon {
            font-size: 20px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .folder-item .file-icon::before {
            content: "📁";
        }

        .file-item:not(.folder-item) .file-icon::before {
            content: "📄";
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        /* Mobile Tabs */
        .mobile-tabs {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.15s ease;
            gap: 8px;
            white-space: nowrap;
            min-width: 120px;
            justify-content: center;
            flex-shrink: 0;
        }

        .mobile-tab.active {
            color: #000;
            border-bottom-color: #000;
        }

        .mobile-tab:active {
            background: #f5f5f5;
        }

        .tab-close {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-left: auto;
        }

        .tab-close:active {
            background: rgba(0, 0, 0, 0.2);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .CodeMirror-gutters {
            border-right: 1px solid #eaeaea;
            background: #fafafa;
        }

        .CodeMirror-linenumber {
            color: #999;
            padding: 0 6px;
            font-size: 12px;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #000 !important;
        }

        /* Mobile Status Bar */
        .mobile-status-bar {
            height: 48px;
            background: #fff;
            border-top: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            color: #666;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .save-btn {
            padding: 8px 16px;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            background: #fff;
            color: #000;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .save-btn:not(:disabled):active {
            background: #f5f5f5;
            transform: scale(0.95);
        }

        .save-btn.primary {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Empty State */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .mobile-empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #000;
        }

        .mobile-empty-state p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Mobile Console */
        .mobile-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50vh;
            background: #fff;
            border-top: 1px solid #eaeaea;
            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .mobile-console.open {
            transform: translateY(0);
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px;
            border-bottom: 1px solid #eaeaea;
            background: #fafafa;
        }

        .console-title {
            font-size: 16px;
            font-weight: 600;
        }

        .console-actions {
            display: flex;
            gap: 8px;
        }

        .console-btn {
            padding: 8px 12px;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            background: #fff;
            color: #000;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .console-btn:active {
            background: #f5f5f5;
            transform: scale(0.95);
        }

        .console-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .console-close {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 18px;
        }

        .console-close:active {
            background: #f5f5f5;
        }

        .console-output {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
            background: #fafafa;
            -webkit-overflow-scrolling: touch;
        }

        .console-line {
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .header {
                height: 64px;
                padding: 0 24px;
            }

            .main-container {
                margin-top: 64px;
                flex-direction: row;
            }

            .sidebar {
                position: relative;
                top: 0;
                width: 280px;
                height: 100%;
                transform: translateX(0);
                transition: none;
                border-right: 1px solid #eaeaea;
            }

            .sidebar-overlay {
                display: none;
            }

            .mobile-menu-btn {
                display: none;
            }

            .mobile-tabs {
                display: flex;
            }

            .mobile-console {
                height: 300px;
            }

            .header-left {
                gap: 16px;
            }

            .current-file {
                font-size: 16px;
            }

            .breadcrumb {
                display: flex;
                align-items: center;
                gap: 8px;
                color: #666;
                font-size: 14px;
            }

            .breadcrumb-separator {
                color: #ccc;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .sidebar {
                width: 320px;
            }

            .mobile-console {
                height: 350px;
            }
        }

        /* Touch optimizations */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* Mobile scrollbars */
        @media (max-width: 767px) {
            ::-webkit-scrollbar {
                width: 2px;
                height: 2px;
            }
        }

        /* Custom Icons */
        .icon-menu::before { content: "☰"; }
        .icon-save::before { content: "💾"; }
        .icon-terminal::before { content: "⌨"; }
        .icon-plus::before { content: "+"; }
        .icon-folder::before { content: "📁"; }
        .icon-close::before { content: "×"; }
        .icon-play::before { content: "▶"; }
        .icon-stop::before { content: "⏹"; }
        .icon-file::before { content: "📄"; }

        /* Loading states */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ccc;
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Landscape orientation adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            .header {
                height: 48px;
            }
            
            .main-container {
                margin-top: 48px;
            }
            
            .sidebar {
                top: 48px;
                height: calc(100vh - 48px);
            }
            
            .sidebar-overlay {
                top: 48px;
            }
            
            .mobile-console {
                height: 60vh;
            }
            
            .file-item {
                padding: 12px 20px;
                min-height: 44px;
            }
            
            .mobile-tab {
                padding: 12px 16px;
            }
        }

        /* iOS safe area support */
        @supports (padding: max(0px)) {
            .app-container {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
            
            .mobile-console {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-btn touch-target" id="mobile-menu-btn">
                    <span class="icon-menu"></span>
                </button>
                <a href="#" class="logo">
                    <div class="logo-icon">E</div>
                    <span class="current-file" id="current-file">Select a file</span>
                </a>
                <nav class="breadcrumb">
                    <span>{{ bot.name }}</span>
                    <span class="breadcrumb-separator">/</span>
                    <span id="current-file-breadcrumb">Select a file</span>
                </nav>
            </div>
            <div class="header-right">
                <button class="header-btn touch-target" id="save-btn-header" disabled>
                    <span class="icon-save"></span>
                </button>
                <button class="header-btn touch-target" id="console-toggle">
                    <span class="icon-terminal"></span>
                </button>
            </div>
        </header>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Files</span>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn touch-target" id="new-file-btn" title="New File">
                            <span class="icon-plus"></span>
                        </button>
                        <button class="sidebar-btn touch-target" id="new-folder-btn" title="New Folder">
                            <span class="icon-folder"></span>
                        </button>
                    </div>
                </div>
                <div class="file-tree" id="file-tree">
                    <!-- Files will be populated here -->
                </div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Mobile Tabs -->
                <div class="mobile-tabs" id="mobile-tabs">
                    <div class="tabs-wrapper" id="tabs-wrapper">
                        <!-- Tabs will be populated here -->
                    </div>
                </div>

                <!-- Editor -->
                <div class="mobile-editor-container" id="editor-container">
                    <div class="mobile-empty-state" id="empty-state">
                        <div class="empty-icon">
                            <span class="icon-file"></span>
                        </div>
                        <h3>No file selected</h3>
                        <p>Tap the menu button and select a file to start editing</p>
                    </div>
                </div>

                <!-- Mobile Status Bar -->
                <div class="mobile-status-bar">
                    <div class="status-left">
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <span id="bot-status">Status: {{ bot.status }}</span>
                    </div>
                    <button class="save-btn touch-target" id="save-btn" disabled>Save</button>
                </div>
            </main>
        </div>

        <!-- Mobile Console -->
        <div class="mobile-console" id="mobile-console">
            <div class="console-header">
                <span class="console-title">Console</span>
                <div class="console-actions">
                    <button class="console-btn touch-target" id="start-bot-btn">
                        <span class="icon-play"></span>
                        Start
                    </button>
                    <button class="console-btn touch-target" id="stop-bot-btn">
                        <span class="icon-stop"></span>
                        Stop
                    </button>
                    <button class="console-close touch-target" id="console-close">
                        <span class="icon-close"></span>
                    </button>
                </div>
            </div>
            <div class="console-output" id="console-output">
                <div class="console-line">Welcome to the console...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const serverIndex = {{ request.view_args.server_index }};
            const botId = "{{ bot._id }}";
            
            // Elements
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const fileTree = document.getElementById('file-tree');
            const mobileTabs = document.getElementById('mobile-tabs');
            const tabsWrapper = document.getElementById('tabs-wrapper');
            const editorContainer = document.getElementById('editor-container');
            const emptyState = document.getElementById('empty-state');
            const mobileConsole = document.getElementById('mobile-console');
            const consoleToggle = document.getElementById('console-toggle');
            const consoleClose = document.getElementById('console-close');
            const consoleOutput = document.getElementById('console-output');
            const currentFileSpan = document.getElementById('current-file');
            const currentFileBreadcrumb = document.getElementById('current-file-breadcrumb');
            const saveBtn = document.getElementById('save-btn');
            const saveBtnHeader = document.getElementById('save-btn-header');
            const cursorPosition = document.getElementById('cursor-position');
            const botStatus = document.getElementById('bot-status');

            let openTabs = new Map();
            let activeTab = null;
            let editor = null;

            // Mobile menu toggle
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }

            sidebarOverlay.addEventListener('click', closeSidebar);

            function toggleSidebar() {
                const isOpen = sidebar.classList.contains('open');
                if (isOpen) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            }

            function openSidebar() {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            // Console toggle
            consoleToggle.addEventListener('click', () => {
                const isOpen = mobileConsole.classList.contains('open');
                if (isOpen) {
                    mobileConsole.classList.remove('open');
                    consoleToggle.classList.remove('active');
                } else {
                    mobileConsole.classList.add('open');
                    consoleToggle.classList.add('active');
                }
            });

            consoleClose.addEventListener('click', () => {
                mobileConsole.classList.remove('open');
                consoleToggle.classList.remove('active');
            });

            // Initialize CodeMirror
            function initEditor() {
                if (editor) return;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'editor-wrapper';
                editorContainer.appendChild(wrapper);
                
                editor = CodeMirror(wrapper, {
                    mode: 'python',
                    theme: 'github',
                    lineNumbers: true,
                    autofocus: false,
                    lineWrapping: true,
                    indentUnit: 4,
                    smartIndent: true,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    viewportMargin: Infinity,
                    extraKeys: {
                        "Ctrl-S": function() { saveFile(); },
                        "Cmd-S": function() { saveFile(); }
                    }
                });

                editor.setOption("scrollbarStyle", "null");
                
                editor.on('cursorActivity', () => {
                    const cursor = editor.getCursor();
                    cursorPosition.textContent = `Ln ${cursor.line + 1}, Col ${cursor.ch + 1}`;
                });

                editor.on('change', () => {
                    if (activeTab) {
                        const tab = openTabs.get(activeTab);
                        if (tab && !tab.modified) {
                            tab.modified = true;
                            updateTabTitle(activeTab);
                        }
                        saveBtn.disabled = false;
                        saveBtnHeader.disabled = false;
                        saveBtn.classList.add('primary');
                    }
                });

                // Prevent zoom on focus for iOS
                editor.on('focus', () => {
                    const viewport = document.querySelector('meta[name=viewport]');
                    if (viewport) {
                        viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0');
                    }
                });

                editor.on('blur', () => {
                    const viewport = document.querySelector('meta[name=viewport]');
                    if (viewport) {
                        viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, user-scalable=no');
                    }
                });
            }

            // File tree rendering
            function renderFileTree(tree, container = fileTree, pathPrefix = '') {
                Object.entries(tree).forEach(([name, content]) => {
                    const fullPath = pathPrefix ? `${pathPrefix}/${name}` : name;
                    const item = document.createElement('button');
                    item.className = 'file-item touch-target';
                    item.dataset.path = fullPath;

                    const icon = document.createElement('span');
                    icon.className = 'file-icon';
                    
                    const label = document.createElement('span');
                    label.textContent = name;

                    if (typeof content === 'object') {
                        item.classList.add('folder-item');
                        item.appendChild(icon);
                        item.appendChild(label);
                    } else {
                        item.appendChild(icon);
                        item.appendChild(label);
                        item.addEventListener('click', () => openFile(fullPath));
                    }

                    container.appendChild(item);
                });
            }

            // File operations
            async function openFile(path) {
                try {
                    if (!openTabs.has(path)) {
                        const response = await fetch(`/api/server/${serverIndex}/file?path=${path}`, {
                            headers: {
                                'Content-Type': 'application/json',
                            }
                        });
                        const data = await response.json();
                        
                        if (response.ok && data.content !== undefined) {
                            openTabs.set(path, {
                                content: data.content,
                                modified: false,
                                path: path
                            });
                            createMobileTab(path);
                        } else {
                            console.error('Error opening file:', data.error);
                            return;
                        }
                    }
                    switchToTab(path);
                    closeSidebar();
                } catch (error) {
                    console.error('Network error:', error);
                }
            }

            function createMobileTab(path) {
                const tab = document.createElement('button');
                tab.className = 'mobile-tab touch-target';
                tab.dataset.path = path;
                
                const fileName = path.split('/').pop();
                const label = document.createElement('span');
                label.textContent = fileName;
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close touch-target';
                closeBtn.innerHTML = '<span class="icon-close"></span>';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(path);
                });

                tab.appendChild(label);
                tab.appendChild(closeBtn);
                tab.addEventListener('click', () => switchToTab(path));

                tabsWrapper.appendChild(tab);
                
                // Show tabs container if hidden
                if (mobileTabs.style.display === 'none') {
                    mobileTabs.style.display = 'block';
                }
            }

            function switchToTab(path) {
                // Update active tab
                document.querySelectorAll('.mobile-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.path === path);
                });

                document.querySelectorAll('.file-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.path === path);
                });

                activeTab = path;
                const tabData = openTabs.get(path);
                
                if (tabData) {
                    if (!editor) {
                        emptyState.style.display = 'none';
                        initEditor();
                    }
                    
                    editor.setValue(tabData.content);
                    setTimeout(() => editor.refresh(), 100);
                    const fileName = path.split('/').pop();
                    currentFileSpan.textContent = fileName;
                    if (currentFileBreadcrumb) {
                        currentFileBreadcrumb.textContent = fileName;
                    }
                    saveBtn.disabled = !tabData.modified;
                    saveBtnHeader.disabled = !tabData.modified;
                    
                    if (!tabData.modified) {
                        saveBtn.classList.remove('primary');
                    }
                }
            }

            function closeTab(path) {
                const tab = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                if (tab) tab.remove();
                
                openTabs.delete(path);
                
                if (activeTab === path) {
                    const remainingTabs = document.querySelectorAll('.mobile-tab');
                    if (remainingTabs.length > 0) {
                        switchToTab(remainingTabs[0].dataset.path);
                    } else {
                        activeTab = null;
                        currentFileSpan.textContent = 'Select a file';
                        if (currentFileBreadcrumb) {
                            currentFileBreadcrumb.textContent = 'Select a file';
                        }
                        if (editor) {
                            editorContainer.removeChild(editorContainer.querySelector('.editor-wrapper'));
                            editor = null;
                            emptyState.style.display = 'flex';
                        }
                        saveBtn.disabled = true;
                        saveBtnHeader.disabled = true;
                        saveBtn.classList.remove('primary');
                        mobileTabs.style.display = 'none';
                    }
                }
            }

            function updateTabTitle(path) {
                const tab = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                const tabData = openTabs.get(path);
                if (tab && tabData) {
                    const label = tab.querySelector('span');
                    const fileName = path.split('/').pop();
                    label.textContent = tabData.modified ? `${fileName} •` : fileName;
                }
            }

            // Save file
            async function saveFile() {
                if (!activeTab || !editor) return;
                
                try {
                    saveBtn.disabled = true;
                    saveBtnHeader.disabled = true;
                    
                    const response = await fetch(`/api/server/${serverIndex}/file?path=${activeTab}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: editor.getValue() })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        const tabData = openTabs.get(activeTab);
                        if (tabData) {
                            tabData.modified = false;
                            tabData.content = editor.getValue();
                            updateTabTitle(activeTab);
                            saveBtn.classList.remove('primary');
                        }
                    } else {
                        console.error('Error saving file:', data.error);
                        // Re-enable buttons on error
                        saveBtn.disabled = false;
                        saveBtnHeader.disabled = false;
                    }
                } catch (error) {
                    console.error('Network error:', error);
                    // Re-enable buttons on error
                    saveBtn.disabled = false;
                    saveBtnHeader.disabled = false;
                }
            }

            saveBtn.addEventListener('click', saveFile);
            saveBtnHeader.addEventListener('click', saveFile);

            // New file/folder
            document.getElementById('new-file-btn').addEventListener('click', async () => {
                const path = prompt("Enter new file path (e.g., main.py):");
                if (path) {
                    try {
                        const response = await fetch(`/api/server/${serverIndex}/files/create`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ path: path, type: 'file' })
                        });
                        
                        if (response.ok) {
                            location.reload();
                        } else {
                            const data = await response.json();
                            alert(`Error: ${data.error}`);
                        }
                    } catch (error) {
                        console.error('Error creating file:', error);
                        alert('Network error occurred');
                    }
                }
            });

            document.getElementById('new-folder-btn').addEventListener('click', async () => {
                const path = prompt("Enter new folder path:");
                if (path) {
                    try {
                        const response = await fetch(`/api/server/${serverIndex}/files/create`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ path: path, type: 'folder' })
                        });
                        
                        if (response.ok) {
                            location.reload();
                        } else {
                            const data = await response.json();
                            alert(`Error: ${data.error}`);
                        }
                    } catch (error) {
                        console.error('Error creating folder:', error);
                        alert('Network error occurred');
                    }
                }
            });

            // Bot controls - JAVÍTOTT VERZIÓ
            document.getElementById('start-bot-btn').addEventListener('click', async () => {
                try {
                    const startBtn = document.getElementById('start-bot-btn');
                    startBtn.disabled = true;
                    startBtn.innerHTML = '<div class="spinner"></div> Starting...';
                    
                    const response = await fetch(`/api/server/${serverIndex}/start`, { 
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        botStatus.textContent = 'Status: online';
                        // Add success message to console
                        addConsoleMessage('✅ Bot started successfully', 'success');
                    } else {
                        console.error('Error starting bot:', data.error);
                        addConsoleMessage(`❌ Failed to start bot: ${data.error}`, 'error');
                        alert(`Failed to start bot: ${data.error}`);
                    }
                } catch (error) {
                    console.error('Network error:', error);
                    addConsoleMessage(`💥 Network error: ${error.message}`, 'error');
                    alert(`Network error: ${error.message}`);
                } finally {
                    const startBtn = document.getElementById('start-bot-btn');
                    startBtn.disabled = false;
                    startBtn.innerHTML = '<span class="icon-play"></span> Start';
                }
            });

            document.getElementById('stop-bot-btn').addEventListener('click', async () => {
                try {
                    const stopBtn = document.getElementById('stop-bot-btn');
                    stopBtn.disabled = true;
                    stopBtn.innerHTML = '<div class="spinner"></div> Stopping...';
                    
                    const response = await fetch(`/api/server/${serverIndex}/stop`, { 
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        botStatus.textContent = 'Status: offline';
                        addConsoleMessage('⏹ Bot stopped successfully', 'success');
                    } else {
                        console.error('Error stopping bot:', data.error);
                        addConsoleMessage(`❌ Failed to stop bot: ${data.error}`, 'error');
                        alert(`Failed to stop bot: ${data.error}`);
                    }
                } catch (error) {
                    console.error('Network error:', error);
                    addConsoleMessage(`💥 Network error: ${error.message}`, 'error');
                    alert(`Network error: ${error.message}`);
                } finally {
                    const stopBtn = document.getElementById('stop-bot-btn');
                    stopBtn.disabled = false;
                    stopBtn.innerHTML = '<span class="icon-stop"></span> Stop';
                }
            });

            // Helper function to add console messages
            function addConsoleMessage(message, type = 'info') {
                const line = document.createElement('div');
                line.className = 'console-line';
                const timestamp = new Date().toLocaleTimeString();
                line.textContent = `[${timestamp}] ${message}`;
                
                if (type === 'error') {
                    line.style.color = '#ff4444';
                } else if (type === 'success') {
                    line.style.color = '#00aa00';
                }
                
                consoleOutput.appendChild(line);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            }

            // Socket.IO for console
            const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port + '/editor');

            socket.on('connect', () => {
                console.log('Socket.IO connected');
                socket.emit('join', { bot_id: botId });
            });

            socket.on('disconnect', () => {
                console.log('Socket.IO disconnected');
                addConsoleMessage('🔌 Connection lost', 'error');
            });

            socket.on('log', (msg) => {
                const line = document.createElement('div');
                line.className = 'console-line';
                line.textContent = msg.data;
                consoleOutput.appendChild(line);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            });

            // Touch gestures
            let touchStartX = 0;
            let touchStartY = 0;

            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            document.addEventListener('touchmove', (e) => {
                if (!touchStartX || !touchStartY) return;

                const touchEndX = e.touches[0].clientX;
                const touchEndY = e.touches[0].clientY;
                const deltaX = touchStartX - touchEndX;
                const deltaY = touchStartY - touchEndY;

                // Swipe right to open sidebar (from left edge)
                if (touchStartX < 20 && deltaX < -100 && Math.abs(deltaY) < 50) {
                    openSidebar();
                }
                
                // Swipe left to close sidebar
                if (sidebar.classList.contains('open') && deltaX > 100 && Math.abs(deltaY) < 50) {
                    closeSidebar();
                }
            });

            // Prevent iOS bounce scroll
            document.addEventListener('touchmove', (e) => {
                if (e.target.closest('.console-output') || 
                    e.target.closest('.file-tree') || 
                    e.target.closest('.CodeMirror-scroll') ||
                    e.target.closest('.mobile-tabs')) {
                    return;
                }
                e.preventDefault();
            }, { passive: false });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 's') {
                        e.preventDefault();
                        if (!saveBtn.disabled) saveFile();
                    }
                    if (e.key === '`') {
                        e.preventDefault();
                        consoleToggle.click();
                    }
                }
            });

            // Initialize
            renderFileTree({{ bot.files_tree | tojson }});
            
            // Check initial bot status
            fetch(`/api/server/${serverIndex}/status`)
                .then(response => response.json())
                .then(data => {
                    if (data.status) {
                        botStatus.textContent = `Status: ${data.status}`;
                    }
                })
                .catch(console.error);
        });
    </script>
</body>
</html>
