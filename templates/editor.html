<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Enhanced Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 
                        0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .glass-button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .glass-button:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Normalized Mobile Header with padding */
        .header {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0 0 20px 20px;
            padding: 14px 24px; /* Increased padding */
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: calc(16px + 56px + 16px);
            right: calc(16px + 56px + 16px);
            z-index: 998;
            margin-top: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #ffffff;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* Updated file display */
        .current-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-weight: 500;
        }

        .file-path {
            color: #ffffff;
            font-weight: 600;
        }

        .file-separator {
            color: rgba(255, 255, 255, 0.4);
            margin: 0 6px;
        }

        /* Normalized Edge Buttons */
        .edge-button {
            position: fixed;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            z-index: 999;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .edge-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .edge-button:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .edge-button:disabled {
            background: rgba(255, 255, 255, 0.008);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .edge-button.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* Hide buttons when sidebar is open */
        .edge-button.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-10px);
        }

        /* Left Side - Menu button */
        .mobile-menu-btn {
            left: 16px;
            top: 16px;
        }

        /* Right Side - User Profile and Action Buttons */
        .user-profile {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .user-profile:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* User Profile Dropdown */
        .user-dropdown {
            position: fixed;
            top: calc(16px + 56px + 16px);
            right: 16px;
            width: 240px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-dropdown-header {
            padding: 12px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .user-dropdown-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .user-dropdown-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-dropdown-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .user-dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 8px 0;
        }

        /* Right side action buttons - positioned symmetrically */
        .save-btn-header {
            right: 16px;
            top: calc(16px + 56px + 16px);
        }

        .console-toggle {
            right: 16px;
            top: calc(16px + 56px + 16px + 56px + 16px);
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 96px; /* Increased from 72px to add more padding */
            overflow: hidden;
        }

        /* Enhanced Sidebar */
        .sidebar {
            position: fixed;
            top: 96px; /* Adjusted to match main-container */
            left: 0;
            width: 100%;
            height: calc(100vh - 96px); /* Adjusted height */
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 96px; /* Adjusted to match sidebar */
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 32px 28px 28px; /* Increased padding */
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0; /* Increased padding */
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 20px 28px; /* Increased padding */
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 0;
            font-weight: 500;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #ffffff;
        }

        .file-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.active {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 3px solid rgba(255, 255, 255, 0.8);
            color: #ffffff;
        }

        .file-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Mobile Tabs with padding */
        .mobile-tabs {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
            height: 52px;
            padding: 0 8px; /* Added padding */
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
            height: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px; /* Increased padding */
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            white-space: nowrap;
            min-width: 160px;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
            height: 100%;
        }

        .mobile-tab.active {
            color: #ffffff;
            border-bottom-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.025);
        }

        .mobile-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.9);
        }

        .mobile-tab:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-close {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.1);
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            background: #101010 !important;
            color: #ffffff !important;
        }

        .CodeMirror-gutters {
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .CodeMirror-linenumber {
            color: rgba(255, 255, 255, 0.4) !important;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #ffffff !important;
        }

        .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.12) !important;
        }

        /* Empty State - Moved down by 26% total (20% + 6%) */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 32px 120px;
            min-height: 0;
            transform: translateY(26%); /* Increased from 20% to 26% */
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .mobile-empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .mobile-empty-state p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            line-height: 1.5;
            max-width: 280px;
        }

        /* AI Chat Interface at Bottom - Transparent Input */
        .ai-chat-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 600;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 -8px 32px rgba(0, 0, 0, 0.15);
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-chat-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* AI Suggestions */
        .ai-suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 4px;
        }

        .suggestion-chip {
            padding: 6px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            user-select: none;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .suggestion-chip:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
        }

        /* AI Input - Transparent Background */
        .ai-input-container {
            display: flex;
            gap: 12px;
            align-items: center;
            background: transparent; /* Removed background */
            border: 1px solid rgba(255, 255, 255, 0.08); /* Only border */
            border-radius: 18px;
            padding: 10px 14px;
        }

        .ai-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            placeholder-color: rgba(255, 255, 255, 0.5);
        }

        .ai-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .ai-send-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ai-send-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .ai-send-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(0);
        }

        .ai-send-btn:disabled {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Enhanced Status Bar - above AI Chat */
        .mobile-status-bar {
            height: 50px;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .save-btn {
            padding: 10px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .save-btn:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.02);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }

        .save-btn:not(:disabled):hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .save-btn:not(:disabled):active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .save-btn.primary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .save-btn.primary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* Enhanced Mobile Console */
        .mobile-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55vh;
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .mobile-console.open {
            transform: translateY(0);
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .console-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .console-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Reduced Light Console Buttons */
        .console-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 16px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .console-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .console-btn:active {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .console-btn:disabled {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .console-btn.running {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .console-close {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .console-close:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transform: scale(1.05);
        }

        .console-close:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.95);
        }

        .console-output {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: rgba(16, 16, 16, 0.3);
            -webkit-overflow-scrolling: touch;
            color: rgba(255, 255, 255, 0.9);
        }

        .console-line {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding: 3px 0;
            opacity: 0.9;
        }

        .console-line.error {
            opacity: 1;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
        }

        .console-line.warning {
            opacity: 0.8;
            font-weight: 500;
        }

        .console-line.success {
            opacity: 1;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
        }

        .console-line.info {
            opacity: 0.7;
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .header {
                height: 64px;
                padding: 18px 28px; /* Increased padding */
                left: calc(16px + 56px + 16px);
                right: calc(16px + 56px + 16px);
                border-radius: 0 0 24px 24px;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .current-file {
                font-size: 16px;
            }

            .main-container {
                margin-top: 104px; /* Increased from 80px for more padding */
                flex-direction: row;
            }

            .sidebar {
                position: relative;
                top: 0;
                width: 320px;
                height: 100%;
                transform: translateX(0);
                transition: none;
                border-right: 1px solid rgba(255, 255, 255, 0.04);
            }

            .sidebar-overlay {
                display: none;
            }

            .mobile-menu-btn {
                display: none;
            }

            .mobile-tabs {
                display: flex;
                padding: 0 12px; /* Increased padding for desktop */
            }

            .mobile-console {
                height: 360px;
            }

            .console-actions {
                gap: 16px;
            }

            .console-btn {
                width: 48px;
                height: 48px;
            }

            .empty-icon {
                width: 120px;
                height: 120px;
            }

            .mobile-empty-state h3 {
                font-size: 28px;
            }

            .mobile-empty-state p {
                font-size: 18px;
                max-width: 440px;
            }

            .mobile-empty-state {
                padding: 48px 32px 160px;
            }

            /* Desktop symmetrical positioning */
            .save-btn-header {
                top: calc(16px + 56px + 16px);
            }

            .console-toggle {
                top: calc(16px + 56px + 16px + 56px + 16px);
            }

            .user-dropdown {
                top: calc(16px + 56px + 16px);
            }

            /* Don't hide buttons on desktop */
            .edge-button.hidden {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
                transform: none;
            }

            /* AI Chat responsive - larger on desktop */
            .ai-chat-container {
                padding: 20px 30px;
                gap: 16px;
            }

            .ai-suggestions {
                justify-content: flex-start;
                gap: 12px;
            }

            .suggestion-chip {
                padding: 8px 16px;
                font-size: 13px;
            }

            .ai-input-container {
                padding: 12px 16px;
                border-radius: 20px;
            }

            .ai-input {
                font-size: 15px;
            }

            .ai-send-btn {
                width: 36px;
                height: 36px;
                border-radius: 12px;
                font-size: 16px;
            }

            .mobile-status-bar {
                height: 60px;
            }

            .save-btn {
                padding: 12px 24px;
                font-size: 15px;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .sidebar {
                width: 360px;
            }

            .mobile-console {
                height: 420px;
            }
        }

        /* Status indicators */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-indicator.online {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .status-indicator.offline {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            opacity: 0.6;
        }

        .status-indicator.running {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Touch optimizations */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* Enhanced Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Mobile scrollbars */
        @media (max-width: 767px) {
            ::-webkit-scrollbar {
                width: 3px;
                height: 3px;
            }
        }

        /* Context Menu */
        .context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1000;
            min-width: 200px;
        }

        .context-menu-item {
            padding: 16px 24px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-size: 15px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .context-menu-item:disabled {
            color: rgba(255, 255, 255, 0.25);
            cursor: not-allowed;
        }

        .context-menu-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
            margin: 12px 0;
        }

        /* Spinner animation */
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Enhanced Selection colors */
        ::selection {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        ::-moz-selection {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Landscape orientation adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            .header {
                height: 48px;
                margin-top: 4px;
                padding: 12px 20px;
            }
            
            .main-container {
                margin-top: 84px; /* Adjusted for increased padding */
            }
            
            .sidebar {
                top: 84px;
                height: calc(100vh - 84px);
            }
            
            .sidebar-overlay {
                top: 84px;
            }
            
            .mobile-console {
                height: 65vh;
            }
            
            .file-item {
                padding: 12px 24px;
                min-height: 44px;
            }
            
            .mobile-tab {
                padding: 12px 20px;
            }

            .console-actions {
                gap: 8px;
            }

            .console-btn {
                width: 40px;
                height: 40px;
            }

            .save-btn-header {
                top: calc(16px + 56px + 8px);
            }

            .console-toggle {
                top: calc(16px + 56px + 8px + 56px + 8px);
            }

            .user-dropdown {
                top: calc(16px + 56px + 8px);
            }

            .ai-chat-container {
                padding: 12px 16px;
                gap: 8px;
            }
        }

        /* iOS safe area support */
        @supports (padding: max(0px)) {
            .app-container {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
            
            .ai-chat-container {
                padding-bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
            }

            .mobile-console {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Normalized Header -->
        <header class="header">
            <a href="#" class="logo">
                <div class="logo-icon">E</div>
                <span class="current-file" id="current-file">
                    <span class="file-path">Editor</span>
                    <span class="file-separator">/</span>
                    <span id="current-file-name">Select a file</span>
                </span>
            </a>
        </header>

        <!-- Left Side: Menu Button -->
        <button class="edge-button glass-button mobile-menu-btn touch-target" id="mobile-menu-btn" title="Menu">
            <i data-lucide="menu"></i>
        </button>
        
        <!-- Right Side: User Profile -->
        <div class="user-profile touch-target" id="user-profile" title="User Profile">
            <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="user-avatar">
        </div>

        <!-- User Dropdown -->
        <div class="user-dropdown" id="user-dropdown">
            <div class="user-dropdown-header">
                <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="user-dropdown-avatar">
                <div class="user-dropdown-info">
                    <h3>{{ user.username or 'User' }}</h3>
                    <p>Developer</p>
                </div>
            </div>
            <a href="{{ url_for('dashboard') if url_for else '#' }}" class="user-dropdown-item">
                <i data-lucide="layout-dashboard" size="16"></i>
                Dashboard
            </a>
            <a href="https://sycord.com" class="user-dropdown-item">
                <i data-lucide="external-link" size="16"></i>
                Sycord.com
            </a>
            <div class="user-dropdown-separator"></div>
            <a href="{{ url_for('logout') if url_for else '#' }}" class="user-dropdown-item">
                <i data-lucide="log-out" size="16"></i>
                Logout
            </a>
        </div>
        
        <!-- Right Side Action Buttons - Below User Profile -->
        <button class="edge-button glass-button save-btn-header touch-target" id="save-btn-header" disabled title="Save File">
            <i data-lucide="save"></i>
        </button>
        
        <button class="edge-button glass-button console-toggle touch-target" id="console-toggle" title="Toggle Console">
            <i data-lucide="terminal"></i>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">
                        <i data-lucide="folder-open"></i>
                        Files
                    </div>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn glass-button touch-target" id="new-file-btn" title="New File">
                            <i data-lucide="file-plus"></i>
                        </button>
                        <button class="sidebar-btn glass-button touch-target" id="new-folder-btn" title="New Folder">
                            <i data-lucide="folder-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="file-tree" id="file-tree">
                    <!-- Files will be populated here -->
                </div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Mobile Tabs -->
                <div class="mobile-tabs" id="mobile-tabs">
                    <div class="tabs-wrapper" id="tabs-wrapper">
                        <!-- Tabs will be populated here -->
                    </div>
                </div>

                <!-- Editor -->
                <div class="mobile-editor-container" id="editor-container">
                    <div class="mobile-empty-state" id="empty-state">
                        <div class="empty-icon">
                            <i data-lucide="file-text" size="28"></i>
                        </div>
                        <h3>Select a file to edit</h3>
                        <p>Choose a file from the sidebar to start editing your code</p>
                    </div>
                </div>

                <!-- Mobile Status Bar -->
                <div class="mobile-status-bar">
                    <div class="status-left">
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <div class="status-indicator offline" id="bot-status">
                            <div class="status-dot"></div>
                            <span>Offline</span>
                        </div>
                    </div>
                    <button class="save-btn glass-button touch-target" id="save-btn" disabled>
                        <i data-lucide="save" size="16"></i>
                        Save
                    </button>
                </div>
            </main>
        </div>

        <!-- AI Chat Interface at Bottom - Transparent Input -->
        <div class="ai-chat-container" id="ai-chat-container">
            <!-- AI Suggestions -->
            <div class="ai-suggestions">
                <button class="suggestion-chip" data-suggestion="fix code">fix code</button>
                <button class="suggestion-chip" data-suggestion="add a function">add a function</button>
                <button class="suggestion-chip" data-suggestion="clear up">clear up</button>
            </div>
            
            <!-- AI Input -->
            <div class="ai-input-container">
                <input type="text" class="ai-input" id="ai-input" placeholder="Ask AI to help with your code...">
                <button class="ai-send-btn" id="ai-send-btn" title="Send">
                    <i data-lucide="send" size="14"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Console -->
        <div class="mobile-console" id="mobile-console">
            <div class="console-header">
                <div class="console-title">
                    <i data-lucide="terminal" size="20"></i>
                    Console
                </div>
                <div class="console-actions">
                    <!-- Only show start OR stop button based on state -->
                    <button class="console-btn touch-target" id="start-bot-btn" title="Start Bot">
                        <i data-lucide="play" size="18"></i>
                    </button>
                    <button class="console-btn touch-target" id="stop-bot-btn" disabled style="display: none;" title="Stop Bot">
                        <i data-lucide="square" size="16"></i>
                    </button>
                    <button class="console-btn touch-target" id="restart-bot-btn" disabled style="display: none;" title="Restart Bot">
                        <i data-lucide="rotate-cw" size="16"></i>
                    </button>
                    <button class="console-btn touch-target" id="clear-console-btn" title="Clear Console">
                        <i data-lucide="trash-2" size="16"></i>
                    </button>
                    <button class="console-close touch-target" id="console-close">
                        <i data-lucide="x" size="20"></i>
                    </button>
                </div>
            </div>
            <div class="console-output" id="console-output">
                <div class="console-line">Welcome to the console...</div>
                <div class="console-line">Bot status: <span id="console-bot-status">Stopped</span></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Get elements
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const saveBtnHeader = document.getElementById('save-btn-header');
        const consoleToggle = document.getElementById('console-toggle');
        const aiChatContainer = document.getElementById('ai-chat-container');

        // Mobile menu toggle with button hiding
        mobileMenuBtn.addEventListener('click', () => {
            const isOpen = sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
            
            // Hide/show buttons and AI chat when sidebar opens/closes on mobile
            if (window.innerWidth < 768) {
                if (isOpen) {
                    saveBtnHeader.classList.add('hidden');
                    consoleToggle.classList.add('hidden');
                    aiChatContainer.classList.add('hidden');
                } else {
                    saveBtnHeader.classList.remove('hidden');
                    consoleToggle.classList.remove('hidden');
                    aiChatContainer.classList.remove('hidden');
                }
            }
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
            
            // Show buttons and AI chat when sidebar closes
            if (window.innerWidth < 768) {
                saveBtnHeader.classList.remove('hidden');
                consoleToggle.classList.remove('hidden');
                aiChatContainer.classList.remove('hidden');
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                // Desktop: always show buttons and AI chat
                saveBtnHeader.classList.remove('hidden');
                consoleToggle.classList.remove('hidden');
                aiChatContainer.classList.remove('hidden');
            } else {
                // Mobile: hide if sidebar is open
                if (sidebar.classList.contains('open')) {
                    saveBtnHeader.classList.add('hidden');
                    consoleToggle.classList.add('hidden');
                    aiChatContainer.classList.add('hidden');
                }
            }
        });

        // User profile dropdown
        const userProfile = document.getElementById('user-profile');
        const userDropdown = document.getElementById('user-dropdown');

        userProfile.addEventListener('click', (e) => {
            e.stopPropagation();
            userDropdown.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            userDropdown.classList.remove('active');
        });

        userDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Console toggle
        const mobileConsole = document.getElementById('mobile-console');
        const consoleClose = document.getElementById('console-close');

        consoleToggle.addEventListener('click', () => {
            mobileConsole.classList.toggle('open');
            consoleToggle.classList.toggle('active');
        });

        consoleClose.addEventListener('click', () => {
            mobileConsole.classList.remove('open');
            consoleToggle.classList.remove('active');
        });

        // Console buttons
        const startBotBtn = document.getElementById('start-bot-btn');
        const stopBotBtn = document.getElementById('stop-bot-btn');
        const restartBotBtn = document.getElementById('restart-bot-btn');
        const clearConsoleBtn = document.getElementById('clear-console-btn');
        const consoleOutput = document.getElementById('console-output');

        clearConsoleBtn.addEventListener('click', () => {
            consoleOutput.innerHTML = '<div class="console-line">Console cleared...</div>';
        });

        // AI Chat functionality
        const aiInput = document.getElementById('ai-input');
        const aiSendBtn = document.getElementById('ai-send-btn');
        const suggestionChips = document.querySelectorAll('.suggestion-chip');

        // Suggestion chips
        suggestionChips.forEach(chip => {
            chip.addEventListener('click', () => {
                const suggestion = chip.getAttribute('data-suggestion');
                aiInput.value = suggestion;
                aiInput.focus();
                aiSendBtn.disabled = false;
            });
        });

        // AI input and send
        aiInput.addEventListener('input', () => {
            aiSendBtn.disabled = aiInput.value.trim() === '';
        });

        aiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !aiSendBtn.disabled) {
                sendAIMessage();
            }
        });

        aiSendBtn.addEventListener('click', () => {
            if (!aiSendBtn.disabled) {
                sendAIMessage();
            }
        });

        function sendAIMessage() {
            const message = aiInput.value.trim();
            if (message) {
                console.log('AI Message:', message);
                // TODO: Implement AI message sending
                aiInput.value = '';
                aiSendBtn.disabled = true;
            }
        }

        // Save buttons
        const saveBtn = document.getElementById('save-btn');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Code Editor initialized');
            aiSendBtn.disabled = true; // Start with disabled send button

            const startBotBtn = document.getElementById('start-bot-btn');
            const newFileBtn = document.getElementById('new-file-btn');
            const newFolderBtn = document.getElementById('new-folder-btn');
            const serverIndex = {{ bot.server_index }};

            startBotBtn.addEventListener('click', () => {
                fetch(`/api/server/${serverIndex}/start`, {
                    method: 'POST',
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Bot started successfully!');
                    } else {
                        alert(`Error starting bot: ${data.error}`);
                    }
                })
                .catch(error => {
                    console.error('Error starting bot:', error);
                    alert('An error occurred while starting the bot.');
                });
            });

            newFileBtn.addEventListener('click', () => {
                const path = prompt('Enter the path for the new file:');
                if (path) {
                    fetch(`/api/server/${serverIndex}/files/create`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ path: path, type: 'file' }),
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            location.reload();
                        } else {
                            alert(`Error creating file: ${data.error}`);
                        }
                    })
                    .catch(error => {
                        console.error('Error creating file:', error);
                        alert('An error occurred while creating the file.');
                    });
                }
            });

            newFolderBtn.addEventListener('click', () => {
                const path = prompt('Enter the path for the new folder:');
                if (path) {
                    fetch(`/api/server/${serverIndex}/files/create`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ path: path, type: 'folder' }),
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            location.reload();
                        } else {
                            alert(`Error creating folder: ${data.error}`);
                        }
                    })
                    .catch(error => {
                        console.error('Error creating folder:', error);
                        alert('An error occurred while creating the folder.');
                    });
                }
            });
        });
    </script>
</body>
</html>
