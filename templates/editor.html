<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #fafafa;
            color: #000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #000;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: #000;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }

        .breadcrumb-separator {
            color: #ccc;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #eaeaea;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 64px);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
        }

        .icon-button {
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease;
        }

        .icon-button:hover {
            background: #f5f5f5;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background 0.15s ease;
            gap: 8px;
        }

        .file-item:hover {
            background: #f5f5f5;
        }

        .file-item.active {
            background: #000;
            color: #fff;
        }

        .file-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .folder-item {
            font-weight: 500;
        }

        .folder-item .file-icon::before {
            content: "📁";
        }

        .file-item:not(.folder-item) .file-icon::before {
            content: "📄";
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tabs */
        .tabs-container {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            min-height: 48px;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.15s ease;
            gap: 8px;
            white-space: nowrap;
        }

        .tab.active {
            color: #000;
            border-bottom-color: #000;
        }

        .tab:hover:not(.active) {
            color: #000;
            background: #f5f5f5;
        }

        .tab-close {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s ease;
            font-size: 12px;
        }

        .tab:hover .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            background: #eaeaea;
        }

        /* Editor */
        .editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .CodeMirror-gutters {
            border-right: 1px solid #eaeaea;
            background: #fafafa;
        }

        .CodeMirror-linenumber {
            color: #999;
            padding: 0 8px;
        }

        /* Status Bar */
        .status-bar {
            height: 32px;
            background: #fff;
            border-top: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            color: #666;
        }

        .status-left, .status-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 20px;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #000;
        }

        .empty-state p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            background: #fff;
            color: #000;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s ease;
            gap: 8px;
        }

        .btn:hover {
            border-color: #000;
        }

        .btn-primary {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Console */
        .console-container {
            display: none;
            flex-direction: column;
            height: 300px;
            border-top: 1px solid #eaeaea;
            background: #fff;
        }

        .console-container.active {
            display: flex;
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #eaeaea;
            background: #fafafa;
        }

        .console-title {
            font-size: 14px;
            font-weight: 600;
        }

        .console-actions {
            display: flex;
            gap: 8px;
        }

        .console-output {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
            background: #fafafa;
        }

        .console-line {
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 64px;
                height: calc(100vh - 64px);
                z-index: 50;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .mobile-overlay {
                position: fixed;
                top: 64px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 40;
                display: none;
            }

            .mobile-overlay.active {
                display: block;
            }

            .header-left {
                gap: 8px;
            }

            .breadcrumb {
                display: none;
            }

            .console-container {
                height: 250px;
            }

            .tabs-container {
                padding-left: 40px;
            }

            .mobile-menu-btn {
                position: absolute;
                left: 12px;
                width: 32px;
                height: 32px;
                border: none;
                background: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
            }

            .mobile-menu-btn:hover {
                background: #f5f5f5;
            }
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }

        /* Custom Icons */
        .icon-folder::before { content: "📁"; }
        .icon-file::before { content: "📄"; }
        .icon-plus::before { content: "+"; }
        .icon-menu::before { content: "☰"; }
        .icon-close::before { content: "×"; }
        .icon-play::before { content: "▶"; }
        .icon-stop::before { content: "⏹"; }
        .icon-terminal::before { content: "⌨"; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="mobile-menu-btn icon-button" id="mobile-menu-btn">
                <span class="icon-menu"></span>
            </button>
            <a href="#" class="logo">
                <div class="logo-icon">E</div>
                Editor
            </a>
            <nav class="breadcrumb">
                <span>{{ bot.name }}</span>
                <span class="breadcrumb-separator">/</span>
                <span id="current-file">Select a file</span>
            </nav>
        </div>
        <div class="header-right">
            <button class="btn btn-sm" id="console-toggle">
                <span class="icon-terminal"></span>
                Console
            </button>
            <img src="{{ user.avatar_url or '/static/img/default_avatar.png' }}" alt="User" class="user-avatar">
        </div>
    </header>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Files</span>
                <div class="sidebar-actions">
                    <button class="icon-button" id="new-file-btn" title="New File">
                        <span class="icon-plus"></span>
                    </button>
                    <button class="icon-button" id="new-folder-btn" title="New Folder">
                        <span class="icon-folder"></span>
                    </button>
                </div>
            </div>
            <div class="file-tree" id="file-tree">
                <!-- Files will be populated here -->
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content-area">
            <!-- Tabs -->
            <div class="tabs-container" id="tabs-container">
                <!-- Tabs will be populated here -->
            </div>

            <!-- Editor -->
            <div class="editor-container" id="editor-container">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">
                        <span class="icon-file"></span>
                    </div>
                    <h3>No file selected</h3>
                    <p>Select a file from the sidebar to start editing</p>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-left">
                    <span id="cursor-position">Ln 1, Col 1</span>
                    <span id="file-encoding">UTF-8</span>
                </div>
                <div class="status-right">
                    <span id="bot-status">Status: {{ bot.status }}</span>
                    <button class="btn btn-sm btn-primary" id="save-btn" disabled>Save</button>
                </div>
            </div>

            <!-- Console -->
            <div class="console-container" id="console-container">
                <div class="console-header">
                    <span class="console-title">Console</span>
                    <div class="console-actions">
                        <button class="btn btn-sm" id="start-bot-btn">
                            <span class="icon-play"></span>
                            Start
                        </button>
                        <button class="btn btn-sm" id="stop-bot-btn">
                            <span class="icon-stop"></span>
                            Stop
                        </button>
                        <button class="icon-button" id="console-close">
                            <span class="icon-close"></span>
                        </button>
                    </div>
                </div>
                <div class="console-output" id="console-output">
                    <div class="console-line">Welcome to the console...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const serverIndex = {{ request.view_args.server_index }};
            const botId = "{{ bot._id }}";
            
            // Elements
            const sidebar = document.getElementById('sidebar');
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileOverlay = document.getElementById('mobile-overlay');
            const fileTree = document.getElementById('file-tree');
            const tabsContainer = document.getElementById('tabs-container');
            const editorContainer = document.getElementById('editor-container');
            const emptyState = document.getElementById('empty-state');
            const consoleContainer = document.getElementById('console-container');
            const consoleToggle = document.getElementById('console-toggle');
            const consoleClose = document.getElementById('console-close');
            const consoleOutput = document.getElementById('console-output');
            const currentFileSpan = document.getElementById('current-file');
            const saveBtn = document.getElementById('save-btn');
            const cursorPosition = document.getElementById('cursor-position');
            const botStatus = document.getElementById('bot-status');

            let openTabs = new Map();
            let activeTab = null;
            let editor = null;

            // Mobile menu
            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                mobileOverlay.classList.toggle('active');
            });

            mobileOverlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                mobileOverlay.classList.remove('active');
            });

            // Console toggle
            consoleToggle.addEventListener('click', () => {
                consoleContainer.classList.toggle('active');
            });

            consoleClose.addEventListener('click', () => {
                consoleContainer.classList.remove('active');
            });

            // Initialize CodeMirror
            function initEditor() {
                if (editor) return;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'editor-wrapper';
                editorContainer.appendChild(wrapper);
                
                editor = CodeMirror(wrapper, {
                    mode: 'python',
                    theme: 'github',
                    lineNumbers: true,
                    autofocus: true,
                    lineWrapping: true,
                    indentUnit: 4,
                    smartIndent: true,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    foldGutter: true,
                    gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"]
                });

                editor.on('cursorActivity', () => {
                    const cursor = editor.getCursor();
                    cursorPosition.textContent = `Ln ${cursor.line + 1}, Col ${cursor.ch + 1}`;
                });

                editor.on('change', () => {
                    if (activeTab) {
                        const tab = openTabs.get(activeTab);
                        if (tab && !tab.modified) {
                            tab.modified = true;
                            updateTabTitle(activeTab);
                        }
                        saveBtn.disabled = false;
                    }
                });
            }

            // File tree rendering
            function renderFileTree(tree, container = fileTree, pathPrefix = '') {
                Object.entries(tree).forEach(([name, content]) => {
                    const fullPath = pathPrefix ? `${pathPrefix}/${name}` : name;
                    const item = document.createElement('button');
                    item.className = 'file-item';
                    item.dataset.path = fullPath;

                    const icon = document.createElement('span');
                    icon.className = 'file-icon';
                    
                    const label = document.createElement('span');
                    label.textContent = name;

                    if (typeof content === 'object') {
                        item.classList.add('folder-item');
                        item.appendChild(icon);
                        item.appendChild(label);
                        // Handle folder expansion here if needed
                    } else {
                        item.appendChild(icon);
                        item.appendChild(label);
                        item.addEventListener('click', () => openFile(fullPath));
                    }

                    container.appendChild(item);
                });
            }

            // File operations
            async function openFile(path) {
                try {
                    if (!openTabs.has(path)) {
                        const response = await fetch(`/api/server/${serverIndex}/file?path=${path}`);
                        const data = await response.json();
                        
                        if (data.content !== undefined) {
                            openTabs.set(path, {
                                content: data.content,
                                modified: false,
                                path: path
                            });
                            createTab(path);
                        }
                    }
                    switchToTab(path);
                } catch (error) {
                    console.error('Error opening file:', error);
                }
            }

            function createTab(path) {
                const tab = document.createElement('button');
                tab.className = 'tab';
                tab.dataset.path = path;
                
                const fileName = path.split('/').pop();
                const label = document.createElement('span');
                label.textContent = fileName;
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close';
                closeBtn.innerHTML = '<span class="icon-close"></span>';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(path);
                });

                tab.appendChild(label);
                tab.appendChild(closeBtn);
                tab.addEventListener('click', () => switchToTab(path));

                tabsContainer.appendChild(tab);
            }

            function switchToTab(path) {
                // Update active tab
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.path === path);
                });

                document.querySelectorAll('.file-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.path === path);
                });

                activeTab = path;
                const tabData = openTabs.get(path);
                
                if (tabData) {
                    if (!editor) {
                        emptyState.style.display = 'none';
                        initEditor();
                    }
                    
                    editor.setValue(tabData.content);
                    editor.refresh();
                    currentFileSpan.textContent = path.split('/').pop();
                    saveBtn.disabled = !tabData.modified;
                }

                // Close mobile sidebar
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('open');
                    mobileOverlay.classList.remove('active');
                }
            }

            function closeTab(path) {
                const tab = document.querySelector(`[data-path="${path}"]`);
                if (tab) tab.remove();
                
                openTabs.delete(path);
                
                if (activeTab === path) {
                    const remainingTabs = document.querySelectorAll('.tab');
                    if (remainingTabs.length > 0) {
                        switchToTab(remainingTabs[0].dataset.path);
                    } else {
                        activeTab = null;
                        currentFileSpan.textContent = 'Select a file';
                        if (editor) {
                            editorContainer.removeChild(editorContainer.querySelector('.editor-wrapper'));
                            editor = null;
                            emptyState.style.display = 'flex';
                        }
                        saveBtn.disabled = true;
                    }
                }
            }

            function updateTabTitle(path) {
                const tab = document.querySelector(`[data-path="${path}"]`);
                const tabData = openTabs.get(path);
                if (tab && tabData) {
                    const label = tab.querySelector('span');
                    const fileName = path.split('/').pop();
                    label.textContent = tabData.modified ? `${fileName} •` : fileName;
                }
            }

            // Save file
            saveBtn.addEventListener('click', async () => {
                if (!activeTab || !editor) return;
                
                try {
                    await fetch(`/api/server/${serverIndex}/file?path=${activeTab}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: editor.getValue() })
                    });
                    
                    const tabData = openTabs.get(activeTab);
                    if (tabData) {
                        tabData.modified = false;
                        tabData.content = editor.getValue();
                        updateTabTitle(activeTab);
                        saveBtn.disabled = true;
                    }
                } catch (error) {
                    console.error('Error saving file:', error);
                }
            });

            // New file/folder
            document.getElementById('new-file-btn').addEventListener('click', async () => {
                const path = prompt("Enter new file path (e.g., main.py or folder/main.py):");
                if (path) {
                    await fetch(`/api/server/${serverIndex}/files/create`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ path: path, type: 'file' })
                    });
                    location.reload();
                }
            });

            document.getElementById('new-folder-btn').addEventListener('click', async () => {
                const path = prompt("Enter new folder path:");
                if (path) {
                    await fetch(`/api/server/${serverIndex}/files/create`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ path: path, type: 'folder' })
                    });
                    location.reload();
                }
            });

            // Bot controls
            document.getElementById('start-bot-btn').addEventListener('click', async () => {
                await fetch(`/api/server/${serverIndex}/start`, { method: 'POST' });
                botStatus.textContent = 'Status: online';
            });

            document.getElementById('stop-bot-btn').addEventListener('click', async () => {
                await fetch(`/api/server/${serverIndex}/stop`, { method: 'POST' });
                botStatus.textContent = 'Status: offline';
            });

            // Socket.IO for console
            const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port + '/editor');

            socket.on('connect', () => {
                socket.emit('join', { bot_id: botId });
            });

            socket.on('log', (msg) => {
                const line = document.createElement('div');
                line.className = 'console-line';
                line.textContent = msg.data;
                consoleOutput.appendChild(line);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 's') {
                        e.preventDefault();
                        if (!saveBtn.disabled) saveBtn.click();
                    }
                    if (e.key === '`') {
                        e.preventDefault();
                        consoleToggle.click();
                    }
                }
            });

            // Initialize
            renderFileTree({{ bot.files_tree | tojson }});
        });
    </script>
</body>
</html>
