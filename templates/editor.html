<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Enhanced Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 
                        0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .glass-button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .glass-button:disabled {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Normalized Mobile Header with padding */
        .header {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(35px) saturate(1.4);
            -webkit-backdrop-filter: blur(35px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 0 0 20px 20px;
            padding: 14px 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: calc(16px + 56px + 16px);
            right: calc(16px + 56px + 16px);
            z-index: 998;
            margin-top: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #ffffff;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* Updated file display */
        .current-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-weight: 500;
        }

        .file-path {
            color: #ffffff;
            font-weight: 600;
        }

        .file-separator {
            color: rgba(255, 255, 255, 0.4);
            margin: 0 6px;
        }

        /* Focus toggle button in header */
        .focus-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .focus-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-50%) translateY(-2px);
        }

        .focus-toggle.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Normalized Edge Buttons */
        .edge-button {
            position: fixed;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
            z-index: 999;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .edge-button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .edge-button:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .edge-button:disabled {
            background: rgba(255, 255, 255, 0.008);
            border-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .edge-button.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05),
                        0 8px 24px rgba(0, 0, 0, 0.2);
        }

        /* Hide buttons when sidebar is open */
        .edge-button.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-10px);
        }

        /* Left Side - Menu button */
        .mobile-menu-btn {
            left: 16px;
            top: 16px;
        }

        /* Collapsible Action Container */
        .action-container {
            position: fixed;
            right: 16px;
            top: calc(16px + 56px + 16px);
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-container.collapsed {
            transform: translateX(calc(100% - 56px));
        }

        .action-container-inner {
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 56px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .collapse-toggle {
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .collapse-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateY(-50%) translateX(-2px);
        }

        .collapse-toggle.collapsed {
            transform: translateY(-50%) rotate(180deg);
        }

        .collapse-toggle.collapsed:hover {
            transform: translateY(-50%) rotate(180deg) translateX(-2px);
        }

        /* Update existing button styles to work within container */
        .save-btn-header,
        .console-toggle {
            position: relative;
            right: auto;
            top: auto;
            margin: 0;
        }

        /* Fixed Status Dot */
        .console-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff6b35;
            border-radius: 50%;
            top: 6px;
            right: 6px;
            z-index: 1;
            transition: background-color 0.3s ease;
        }

        .console-indicator.running {
            background-color: #4ade80;
            animation: pulse 2s infinite;
        }

        .console-indicator.stopped {
            background-color: #ff6b35;
        }

        /* Right Side - User Profile */
        .user-profile {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02),
                        0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04),
                        0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .user-profile:active {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(0);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03),
                        0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* User Profile Dropdown */
        .user-dropdown {
            position: fixed;
            top: calc(16px + 56px + 16px);
            right: 16px;
            width: 240px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.03);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-dropdown-header {
            padding: 12px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .user-dropdown-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .user-dropdown-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-dropdown-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .user-dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 8px 0;
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 96px;
            margin-bottom: 200px;
            overflow: hidden;
        }

        /* Focus Mode Styles */
        .app-container.focus-mode .action-container,
        .app-container.focus-mode .ai-chat-container,
        .app-container.focus-mode .mobile-status-bar {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .app-container.focus-mode .main-container {
            margin-bottom: 0;
        }

        .app-container.focus-mode .content-area {
            height: calc(100vh - 96px);
        }

        /* Enhanced Sidebar */
        .sidebar {
            position: fixed;
            top: 96px;
            left: 0;
            width: 100%;
            height: calc(100vh - 96px);
            background: rgba(255, 255, 255, 0.008);
            backdrop-filter: blur(30px) saturate(1.3);
            -webkit-backdrop-filter: blur(30px) saturate(1.3);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 96px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 32px 28px 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            border: none;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 20px 28px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 0;
            font-weight: 500;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #ffffff;
        }

        .file-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .file-item.active {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 3px solid rgba(255, 255, 255, 0.8);
            color: #ffffff;
        }

        .file-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Mobile Tabs with padding */
        .mobile-tabs {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
            height: 52px;
            padding: 0 8px;
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
            height: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            white-space: nowrap;
            min-width: 160px;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
            height: 100%;
        }

        .mobile-tab.active {
            color: #ffffff;
            border-bottom-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.025);
        }

        .mobile-tab:hover {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.9);
        }

        .mobile-tab:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .tab-close {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: scale(1.1);
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            background: #101010 !important;
            color: #ffffff !important;
        }

        .CodeMirror-gutters {
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .CodeMirror-linenumber {
            color: rgba(255, 255, 255, 0.4) !important;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #ffffff !important;
        }

        .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.08) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.12) !important;
        }

        /* Empty State - Moved down by 26% total (20% + 6%) */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 32px 120px;
            min-height: 0;
            transform: translateY(26%);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;

            height: 40px;

            justify-content: center;

            background: rgba(255, 255, 255, 0.06);

            background: rgba(255, 255, 255, 0.08);

        }

        }

                <button class="suggestion-chip">Optimize code</button>
                <button class="suggestion-chip">Add comments</button>
                <button class="suggestion-chip">Debug error</button>
            </div>
            
            <div class="ai-input-container">
                <input type="text" class="ai-input" id="aiInput" placeholder="Ask AI to help with your code...">
                <button class="ai-send-btn" id="aiSendBtn" disabled>
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Console -->
        <div class="mobile-console" id="mobileConsole">
            <div class="console-header">
                <div class="console-title">
                    <i data-lucide="terminal"></i>
                    Console
                </div>
                <div class="console-actions">
                    <button class="console-btn" id="runBtn">
                        <i data-lucide="play"></i>
                    </button>
                    <button class="console-btn" id="stopBtn" disabled>
                        <i data-lucide="square"></i>
                    </button>
                    <button class="console-btn" id="clearBtn">
                        <i data-lucide="trash-2"></i>
                    </button>
                    <button class="console-close" id="consoleClose">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>
            <div class="console-output" id="consoleOutput">
                <div class="console-line info">Console ready...</div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Global state
        let editor;
        let isConsoleOpen = false;
        let isRunning = false;
        let isActionContainerCollapsed = false;
        let isFocusMode = false;
        
        // DOM elements
        const appContainer = document.getElementById('appContainer');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const actionContainer = document.getElementById('actionContainer');
        const collapseToggle = document.getElementById('collapseToggle');
        const consoleToggle = document.getElementById('consoleToggle');
        const consoleIndicator = document.getElementById('consoleIndicator');
        const mobileConsole = document.getElementById('mobileConsole');
        const consoleClose = document.getElementById('consoleClose');
        const userProfile = document.getElementById('userProfile');
        const userDropdown = document.getElementById('userDropdown');
        const focusToggle = document.getElementById('focusToggle');
        const aiInput = document.getElementById('aiInput');
        const aiSendBtn = document.getElementById('aiSendBtn');
        const runBtn = document.getElementById('runBtn');
        const stopBtn = document.getElementById('stopBtn');
        const clearBtn = document.getElementById('clearBtn');
        const consoleOutput = document.getElementById('consoleOutput');

        // Initialize CodeMirror
        function initializeEditor() {
            const textarea = document.getElementById('codeEditor');
            if (textarea) {
                editor = CodeMirror.fromTextArea(textarea, {
                    mode: 'python',
                    theme: 'material-darker',
                    lineNumbers: true,
                    lineWrapping: true,
                    autoCloseBrackets: true,
                    matchBrackets: true,
                    indentUnit: 4,
                    indentWithTabs: false,
                    viewportMargin: Infinity
                });

                editor.on('change', function() {
                    const saveBtn = document.getElementById('saveBtn');
                    const saveBtnHeader = document.getElementById('saveBtnHeader');
                    saveBtn.disabled = false;
                    saveBtnHeader.disabled = false;
                });
            }
        }

        // Mobile menu functionality
        mobileMenuBtn.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        });

        sidebarOverlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        });

        // Action container collapse/expand
        collapseToggle.addEventListener('click', function() {
            isActionContainerCollapsed = !isActionContainerCollapsed;
            actionContainer.classList.toggle('collapsed', isActionContainerCollapsed);
            collapseToggle.classList.toggle('collapsed', isActionContainerCollapsed);
        });

        // Console functionality
        consoleToggle.addEventListener('click', function() {
            isConsoleOpen = !isConsoleOpen;
            mobileConsole.classList.toggle('open', isConsoleOpen);
            consoleToggle.classList.toggle('active', isConsoleOpen);
        });

        consoleClose.addEventListener('click', function() {
            isConsoleOpen = false;
            mobileConsole.classList.remove('open');
            consoleToggle.classList.remove('active');
        });

        // Console status indicator updates
        function updateConsoleStatus(status) {
            consoleIndicator.className = `console-indicator ${status}`;
        }

        // Run button functionality
        runBtn.addEventListener('click', function() {
            if (!isRunning) {
                isRunning = true;
                runBtn.disabled = true;
                runBtn.classList.add('running');
                stopBtn.disabled = false;
                updateConsoleStatus('running');
                
                // Add console output
                const output = document.createElement('div');
                output.className = 'console-line success';
                output.textContent = '> Running main.py...';
                consoleOutput.appendChild(output);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
                
                // Simulate execution
                setTimeout(() => {
                    const result = document.createElement('div');
                    result.className = 'console-line';
                    result.textContent = 'Hello, World!';
                    consoleOutput.appendChild(result);
                    consoleOutput.scrollTop = consoleOutput.scrollHeight;
                }, 1000);
            }
        });

        stopBtn.addEventListener('click', function() {
            if (isRunning) {
                isRunning = false;
                runBtn.disabled = false;
                runBtn.classList.remove('running');
                stopBtn.disabled = true;
                updateConsoleStatus('stopped');
                
                const output = document.createElement('div');
                output.className = 'console-line warning';
                output.textContent = '> Execution stopped';
                consoleOutput.appendChild(output);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            }
        });

        clearBtn.addEventListener('click', function() {
            consoleOutput.innerHTML = '<div class="console-line info">Console cleared...</div>';
        });

        // User profile dropdown
        userProfile.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdown.classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            if (!userDropdown.contains(e.target) && !userProfile.contains(e.target)) {
                userDropdown.classList.remove('active');
            }
        });

        // Focus mode functionality
        focusToggle.addEventListener('click', function() {
            isFocusMode = !isFocusMode;
            appContainer.classList.toggle('focus-mode', isFocusMode);
            focusToggle.classList.toggle('active', isFocusMode);
            
            // Update icon
            const icon = focusToggle.querySelector('i');
            if (isFocusMode) {
                icon.setAttribute('data-lucide', 'minimize-2');
            } else {
                icon.setAttribute('data-lucide', 'maximize-2');
            }
            lucide.createIcons();
        });

        // AI input functionality
        aiInput.addEventListener('input', function() {
            aiSendBtn.disabled = this.value.trim() === '';
        });

        aiInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !aiSendBtn.disabled) {
                sendAIMessage();
            }
        });

        aiSendBtn.addEventListener('click', sendAIMessage);

        function sendAIMessage() {
            const message = aiInput.value.trim();
            if (message) {
                console.log('AI Message:', message);
                aiInput.value = '';
                aiSendBtn.disabled = true;
            }
        }

        // File operations
        const fileItems = document.querySelectorAll('.file-item');
        fileItems.forEach(item => {
            item.addEventListener('click', function() {
                // Remove active class from all items
                fileItems.forEach(f => f.classList.remove('active'));
                // Add active class to clicked item
                this.classList.add('active');
                
                // Show editor and hide empty state
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('editorWrapper').style.display = 'block';
                document.getElementById('mobileTabs').style.display = 'flex';
                
                // Initialize editor if not already done
                if (!editor) {
                    setTimeout(initializeEditor, 100);
                }
                
                // Close sidebar on mobile
                if (window.innerWidth < 768) {
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('active');
                }
            });
        });

        // Tab functionality
        const mobileTabs = document.querySelectorAll('.mobile-tab');
        mobileTabs.forEach(tab => {
            tab.addEventListener('click', function(e) {
                if (!e.target.closest('.tab-close')) {
                    mobileTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                }
            });
            
            const closeBtn = tab.querySelector('.tab-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tab.remove();
                    
                    // If no tabs left, show empty state
                    const remainingTabs = document.querySelectorAll('.mobile-tab');
                    if (remainingTabs.length === 0) {
                        document.getElementById('emptyState').style.display = 'flex';
                        document.getElementById('editorWrapper').style.display = 'none';
                        document.getElementById('mobileTabs').style.display = 'none';
                    }
                });
            }
        });

        // Suggestion chips
        const suggestionChips = document.querySelectorAll('.suggestion-chip');
        suggestionChips.forEach(chip => {
            chip.addEventListener('click', function() {
                aiInput.value = this.textContent;
                aiSendBtn.disabled = false;
                aiInput.focus();
            });
        });

        // Responsive behavior
        function handleResize() {
            const isMobile = window.innerWidth < 768;
            
            if (!isMobile) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
            }
        }

        window.addEventListener('resize', handleResize);
        handleResize(); // Initial call

        // Initialize everything when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
