<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Code Editor - {{ bot.name }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #101010;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
        }

        .glass-button:active {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.08);
        }

        .glass-button:disabled {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Symmetrical Header with Rounded Borders */
        .header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0 0 20px 20px;
            padding: 12px 20px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 88px;  /* 16px (margin) + 56px (button width) + 16px (gap) */
            right: 88px; /* 16px (margin) + 56px (button width) + 16px (gap) */
            z-index: 998;
            margin-top: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            color: #ffffff;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Updated file display */
        .current-file {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            font-weight: 500;
        }

        .file-path {
            color: #ffffff;
            font-weight: 600;
        }

        .file-separator {
            color: rgba(255, 255, 255, 0.4);
            margin: 0 6px;
        }

        /* Symmetrical Edge Buttons */
        .edge-button {
            position: fixed;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #ffffff;
            border: none;
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .edge-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 255, 255, 0.15);
        }

        .edge-button:active {
            transform: translateY(-1px);
        }

        .edge-button:disabled {
            transform: none !important;
            box-shadow: none !important;
        }

        .edge-button.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.2);
        }

        /* Left Side - Menu button only */
        .mobile-menu-btn {
            left: 16px;
            top: 16px;
        }

        /* Right Side - User Profile and Action Buttons (symmetrical) */
        .user-profile {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
        }

        .user-profile:active {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(0);
        }

        .user-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        /* User Profile Dropdown */
        .user-dropdown {
            position: fixed;
            top: 80px;
            right: 16px;
            width: 240px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .user-dropdown-header {
            padding: 12px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
        }

        .user-dropdown-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .user-dropdown-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-dropdown-item {
            padding: 12px 20px;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .user-dropdown-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 8px 0;
        }

        /* Right side action buttons - positioned symmetrically below user profile */
        .save-btn-header {
            right: 16px;
            top: 88px; /* 16px (user profile top) + 56px (user profile height) + 16px (gap) */
        }

        .console-toggle {
            right: 16px;
            top: 160px; /* 88px (save button top) + 56px (save button height) + 16px (gap) */
        }

        /* Main Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            margin-top: 64px;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 900;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 800;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 28px 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-actions {
            display: flex;
            gap: 10px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #ffffff;
            border: none;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 56px;
            color: #ffffff;
            border-radius: 0;
            font-weight: 500;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .file-item:active {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-item.active {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: 3px solid #ffffff;
        }

        .file-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        /* Mobile Tabs */
        .mobile-tabs {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            display: none;
            height: 52px;
        }

        .mobile-tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs-wrapper {
            display: inline-flex;
            min-width: 100%;
            height: 100%;
        }

        .mobile-tab {
            display: inline-flex;
            align-items: center;
            padding: 16px 28px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 12px;
            white-space: nowrap;
            min-width: 160px;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 500;
            height: 100%;
        }

        .mobile-tab.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .mobile-tab:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .mobile-tab:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .tab-close {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 10px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: scale(1.1);
        }

        .tab-close:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.95);
        }

        /* Mobile Editor */
        .mobile-editor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .editor-wrapper {
            height: 100%;
            width: 100%;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.6;
            background: #101010 !important;
            color: #ffffff !important;
        }

        .CodeMirror-gutters {
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .CodeMirror-linenumber {
            color: rgba(255, 255, 255, 0.4) !important;
            padding: 0 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .CodeMirror-cursor {
            border-left: 2px solid #ffffff !important;
        }

        .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(255, 255, 255, 0.15) !important;
        }

        /* Empty State - Moved down slightly */
        .mobile-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 48px 32px 120px;
            min-height: 0;
        }

        .empty-icon {
            width: 96px;
            height: 96px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            color: rgba(255, 255, 255, 0.6);
        }

        .mobile-empty-state h3 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .mobile-empty-state p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 17px;
            line-height: 1.5;
            max-width: 320px;
        }

        /* Mobile Status Bar */
        .mobile-status-bar {
            height: 60px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .save-btn {
            padding: 12px 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .save-btn:disabled {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .save-btn:not(:disabled):hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
        }

        .save-btn:not(:disabled):active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(0);
        }

        .save-btn.primary {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.1);
        }

        .save-btn.primary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 255, 255, 0.15);
        }

        /* Mobile Console */
        .mobile-console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55vh;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 700;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .mobile-console.open {
            transform: translateY(0);
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .console-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .console-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Simplified Console Buttons - Only Icons */
        .console-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 16px;
        }

        .console-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.1);
        }

        .console-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(0);
        }

        .console-btn:disabled {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .console-btn.running {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.1);
        }

        .console-close {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ffffff;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .console-close:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        .console-close:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        .console-output {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background: rgba(16, 16, 16, 0.4);
            -webkit-overflow-scrolling: touch;
            color: #ffffff;
        }

        .console-line {
            margin-bottom: 8px;
            word-wrap: break-word;
            padding: 3px 0;
            opacity: 0.9;
        }

        .console-line.error {
            opacity: 1;
            font-weight: 500;
        }

        .console-line.warning {
            opacity: 0.8;
            font-weight: 500;
        }

        .console-line.success {
            opacity: 1;
            font-weight: 500;
        }

        .console-line.info {
            opacity: 0.7;
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .header {
                height: 56px;
                padding: 16px 24px;
                left: 88px;
                right: 88px;
            }

            .main-container {
                margin-top: 72px;
                flex-direction: row;
            }

            .sidebar {
                position: relative;
                top: 0;
                width: 320px;
                height: 100%;
                transform: translateX(0);
                transition: none;
                border-right: 1px solid rgba(255, 255, 255, 0.08);
            }

            .sidebar-overlay {
                display: none;
            }

            .mobile-menu-btn {
                display: none;
            }

            .mobile-tabs {
                display: flex;
            }

            .mobile-console {
                height: 360px;
            }

            .current-file {
                font-size: 15px;
            }

            .console-actions {
                gap: 16px;
            }

            .console-btn {
                width: 48px;
                height: 48px;
            }

            .empty-icon {
                width: 120px;
                height: 120px;
            }

            .mobile-empty-state h3 {
                font-size: 28px;
            }

            .mobile-empty-state p {
                font-size: 18px;
                max-width: 440px;
            }

            .mobile-empty-state {
                padding: 48px 32px 160px;
            }

            /* Desktop symmetrical positioning */
            .save-btn-header {
                top: 96px;
            }

            .console-toggle {
                top: 168px;
            }

            .user-dropdown {
                top: 88px;
            }
        }

        /* Large screens */
        @media (min-width: 1200px) {
            .sidebar {
                width: 360px;
            }

            .mobile-console {
                height: 420px;
            }
        }

        /* Status indicators */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-indicator.online {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .status-indicator.offline {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            opacity: 0.6;
        }

        .status-indicator.running {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Touch optimizations */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Mobile scrollbars */
        @media (max-width: 767px) {
            ::-webkit-scrollbar {
                width: 3px;
                height: 3px;
            }
        }

        /* Context Menu */
        .context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px 0;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            min-width: 200px;
        }

        .context-menu-item {
            padding: 16px 24px;
            color: #ffffff;
            cursor: pointer;
            font-size: 15px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .context-menu-item:disabled {
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .context-menu-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 12px 0;
        }

        /* Spinner animation */
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Selection colors */
        ::selection {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        ::-moz-selection {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* Landscape orientation adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            .header {
                height: 40px;
                margin-top: 4px;
            }
            
            .main-container {
                margin-top: 52px;
            }
            
            .sidebar {
                top: 52px;
                height: calc(100vh - 52px);
            }
            
            .sidebar-overlay {
                top: 52px;
            }
            
            .mobile-console {
                height: 65vh;
            }
            
            .file-item {
                padding: 12px 24px;
                min-height: 44px;
            }
            
            .mobile-tab {
                padding: 12px 20px;
            }

            .console-actions {
                gap: 8px;
            }

            .console-btn {
                width: 40px;
                height: 40px;
            }

            .save-btn-header {
                top: 80px;
            }

            .console-toggle {
                top: 136px;
            }

            .user-dropdown {
                top: 72px;
            }
        }

        /* iOS safe area support */
        @supports (padding: max(0px)) {
            .app-container {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
            
            .mobile-console {
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Symmetrical Header with Rounded Borders -->
        <header class="header">
            <a href="#" class="logo">
                <div class="logo-icon">E</div>
                <span class="current-file" id="current-file">
                    <span class="file-path">Editor</span>
                    <span class="file-separator">/</span>
                    <span id="current-file-name">Select a file</span>
                </span>
            </a>
        </header>

        <!-- Left Side: Menu Button -->
        <button class="edge-button glass-button mobile-menu-btn touch-target" id="mobile-menu-btn" title="Menu">
            <i data-lucide="menu"></i>
        </button>
        
        <!-- Right Side: User Profile -->
        <div class="user-profile touch-target" id="user-profile" title="User Profile">
            <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="user-avatar">
        </div>

        <!-- User Dropdown -->
        <div class="user-dropdown" id="user-dropdown">
            <div class="user-dropdown-header">
                <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="user-dropdown-avatar">
                <div class="user-dropdown-info">
                    <h3>{{ user.username or 'User' }}</h3>
                    <p>Developer</p>
                </div>
            </div>
            <a href="{{ url_for('dashboard') if url_for else '#' }}" class="user-dropdown-item">
                <i data-lucide="layout-dashboard" size="16"></i>
                Dashboard
            </a>
            <a href="https://sycord.com" class="user-dropdown-item">
                <i data-lucide="external-link" size="16"></i>
                Sycord.com
            </a>
            <div class="user-dropdown-separator"></div>
            <a href="{{ url_for('logout') if url_for else '#' }}" class="user-dropdown-item">
                <i data-lucide="log-out" size="16"></i>
                Logout
            </a>
        </div>
        
        <!-- Right Side Action Buttons - Below User Profile -->
        <button class="edge-button glass-button save-btn-header touch-target" id="save-btn-header" disabled title="Save File">
            <i data-lucide="save"></i>
        </button>
        
        <button class="edge-button glass-button console-toggle touch-target" id="console-toggle" title="Toggle Console">
            <i data-lucide="terminal"></i>
        </button>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">
                        <i data-lucide="folder-open"></i>
                        Files
                    </div>
                    <div class="sidebar-actions">
                        <button class="sidebar-btn glass-button touch-target" id="new-file-btn" title="New File">
                            <i data-lucide="file-plus"></i>
                        </button>
                        <button class="sidebar-btn glass-button touch-target" id="new-folder-btn" title="New Folder">
                            <i data-lucide="folder-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="file-tree" id="file-tree">
                    <!-- Files will be populated here -->
                </div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Mobile Tabs -->
                <div class="mobile-tabs" id="mobile-tabs">
                    <div class="tabs-wrapper" id="tabs-wrapper">
                        <!-- Tabs will be populated here -->
                    </div>
                </div>

                <!-- Editor -->
                <div class="mobile-editor-container" id="editor-container">
                    <div class="mobile-empty-state" id="empty-state">
                        <div class="empty-icon">
                            <i data-lucide="file-text" size="36"></i>
                        </div>
                        <h3>Select a file to edit</h3>
                        <p>Choose a file from the sidebar to start editing your code</p>
                    </div>
                </div>

                <!-- Mobile Status Bar -->
                <div class="mobile-status-bar">
                    <div class="status-left">
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <div class="status-indicator offline" id="bot-status">
                            <div class="status-dot"></div>
                            <span>Offline</span>
                        </div>
                    </div>
                    <button class="save-btn glass-button touch-target" id="save-btn" disabled>
                        <i data-lucide="save" size="16"></i>
                        Save
                    </button>
                </div>
            </main>
        </div>

        <!-- Mobile Console -->
        <div class="mobile-console" id="mobile-console">
            <div class="console-header">
                <div class="console-title">
                    <i data-lucide="terminal" size="20"></i>
                    Console
                </div>
                <div class="console-actions">
                    <!-- Only show start OR stop button based on state -->
                    <button class="console-btn touch-target" id="start-bot-btn" title="Start Bot">
                        <i data-lucide="play" size="18"></i>
                    </button>
                    <button class="console-btn touch-target" id="stop-bot-btn" disabled style="display: none;" title="Stop Bot">
                        <i data-lucide="square" size="16"></i>
                    </button>
                    <button class="console-btn touch-target" id="restart-bot-btn" disabled style="display: none;" title="Restart Bot">
                        <i data-lucide="rotate-cw" size="16"></i>
                    </button>
                    <button class="console-btn touch-target" id="clear-console-btn" title="Clear Console">
                        <i data-lucide="trash-2" size="16"></i>
                    </button>
                    <button class="console-close touch-target" id="console-close">
                        <i data-lucide="x" size="20"></i>
                    </button>
                </div>
            </div>
            <div class="console-output" id="console-output">
                <div class="console-line">Welcome to the console...</div>
                <div class="console-line">Bot status: <span id="console-bot-status">Stopped</span></div>
            </div>
        </div>

        <!-- Context Menu -->
        <div class="context-menu" id="context-menu" style="display: none;">
            <button class="context-menu-item" id="rename-file">
                <i data-lucide="edit-3" size="16"></i>
                Rename
            </button>
            <button class="context-menu-item" id="delete-file">
                <i data-lucide="trash-2" size="16"></i>
                Delete
            </button>
            <div class="context-menu-separator"></div>
            <button class="context-menu-item" id="download-file">
                <i data-lucide="download" size="16"></i>
                Download
            </button>
        </div>
    </div>

    <script>
        // [Previous JavaScript code remains exactly the same - no changes needed]
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Lucide icons
            lucide.createIcons();

            const serverIndex = {{ request.view_args.server_index }};
            const botId = "{{ bot._id }}";
            
            // Elements
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const fileTree = document.getElementById('file-tree');
            const mobileTabs = document.getElementById('mobile-tabs');
            const tabsWrapper = document.getElementById('tabs-wrapper');
            const editorContainer = document.getElementById('editor-container');
            const emptyState = document.getElementById('empty-state');
            const mobileConsole = document.getElementById('mobile-console');
            const consoleToggle = document.getElementById('console-toggle');
            const consoleClose = document.getElementById('console-close');
            const consoleOutput = document.getElementById('console-output');
            const currentFileName = document.getElementById('current-file-name');
            const saveBtn = document.getElementById('save-btn');
            const saveBtnHeader = document.getElementById('save-btn-header');
            const cursorPosition = document.getElementById('cursor-position');
            const botStatus = document.getElementById('bot-status');
            const consoleBotStatus = document.getElementById('console-bot-status');
            const contextMenu = document.getElementById('context-menu');
            const userProfile = document.getElementById('user-profile');
            const userDropdown = document.getElementById('user-dropdown');
            
            // Bot control elements
            const startBotBtn = document.getElementById('start-bot-btn');
            const stopBotBtn = document.getElementById('stop-bot-btn');
            const restartBotBtn = document.getElementById('restart-bot-btn');
            const clearConsoleBtn = document.getElementById('clear-console-btn');

            let openTabs = new Map();
            let activeTab = null;
            let editor = null;
            let socket = null;
            let botRunning = false;
            let selectedFile = null;

            // User profile dropdown toggle
            userProfile.addEventListener('click', (e) => {
                e.stopPropagation();
                userDropdown.classList.toggle('active');
            });

            // Close user dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!userProfile.contains(e.target) && !userDropdown.contains(e.target)) {
                    userDropdown.classList.remove('active');
                }
            });

            // Initialize Socket.IO connection
            function initSocket() {
                socket = io();
                
                socket.on('connect', function() {
                    addConsoleMessage('Connected to server', 'success');
                    updateBotStatus('online', 'Connected');
                });

                socket.on('disconnect', function() {
                    addConsoleMessage('Disconnected from server', 'error');
                    updateBotStatus('offline', 'Offline');
                });

                socket.on('bot_output', function(data) {
                    addConsoleMessage(data.message, data.type || 'info');
                });

                socket.on('bot_status', function(data) {
                    botRunning = data.running;
                    updateBotControlButtons();
                    updateBotStatus(data.running ? 'running' : 'offline', data.status);
                    consoleBotStatus.textContent = data.status;
                });

                socket.on('file_changed', function(data) {
                    if (openTabs.has(data.path)) {
                        addConsoleMessage(`File ${data.path} was modified externally`, 'warning');
                    }
                });

                socket.on('error', function(data) {
                    addConsoleMessage(`Error: ${data.message}`, 'error');
                });
            }

            // Console functions
            function addConsoleMessage(message, type = 'info') {
                const line = document.createElement('div');
                line.className = `console-line ${type}`;
                line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                consoleOutput.appendChild(line);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            }

            function clearConsole() {
                consoleOutput.innerHTML = '';
                addConsoleMessage('Console cleared', 'info');
            }

            function updateBotStatus(status, message) {
                botStatus.className = `status-indicator ${status}`;
                botStatus.querySelector('span').textContent = message || status;
            }

            function updateBotControlButtons() {
                if (botRunning) {
                    startBotBtn.style.display = 'none';
                    stopBotBtn.style.display = 'flex';
                    restartBotBtn.style.display = 'flex';
                    stopBotBtn.disabled = false;
                    restartBotBtn.disabled = false;
                    stopBotBtn.classList.add('running');
                    restartBotBtn.classList.add('running');
                } else {
                    startBotBtn.style.display = 'flex';
                    stopBotBtn.style.display = 'none';
                    restartBotBtn.style.display = 'none';
                    startBotBtn.disabled = false;
                    startBotBtn.classList.remove('running');
                }
                lucide.createIcons();
            }

            // Bot control functions
            startBotBtn.addEventListener('click', function() {
                socket.emit('start_bot', { server_index: serverIndex, bot_id: botId });
                addConsoleMessage('Starting bot...', 'info');
                startBotBtn.disabled = true;
            });

            stopBotBtn.addEventListener('click', function() {
                socket.emit('stop_bot', { server_index: serverIndex, bot_id: botId });
                addConsoleMessage('Stopping bot...', 'info');
                stopBotBtn.disabled = true;
            });

            restartBotBtn.addEventListener('click', function() {
                socket.emit('restart_bot', { server_index: serverIndex, bot_id: botId });
                addConsoleMessage('Restarting bot...', 'info');
                restartBotBtn.disabled = true;
            });

            clearConsoleBtn.addEventListener('click', clearConsole);

            // Mobile menu toggle
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSidebar();
                });
            }

            sidebarOverlay.addEventListener('click', closeSidebar);

            function toggleSidebar() {
                const isOpen = sidebar.classList.contains('open');
                if (isOpen) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            }

            function openSidebar() {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            // Console toggle
            consoleToggle.addEventListener('click', () => {
                const isOpen = mobileConsole.classList.contains('open');
                if (isOpen) {
                    mobileConsole.classList.remove('open');
                    consoleToggle.classList.remove('active');
                } else {
                    mobileConsole.classList.add('open');
                    consoleToggle.classList.add('active');
                }
            });

            consoleClose.addEventListener('click', () => {
                mobileConsole.classList.remove('open');
                consoleToggle.classList.remove('active');
            });

            // Context menu
            function showContextMenu(e, filePath) {
                e.preventDefault();
                selectedFile = filePath;
                contextMenu.style.display = 'block';
                contextMenu.style.left = `${e.pageX}px`;
                contextMenu.style.top = `${e.pageY}px`;
            }

            function hideContextMenu() {
                contextMenu.style.display = 'none';
                selectedFile = null;
            }

            document.addEventListener('click', hideContextMenu);

            // Context menu actions
            document.getElementById('rename-file').addEventListener('click', async () => {
                if (!selectedFile) return;
                const newName = prompt('Enter new name:', selectedFile.split('/').pop());
                if (newName) {
                    try {
                        const response = await fetch(`/api/server/${serverIndex}/files/rename`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ 
                                old_path: selectedFile, 
                                new_name: newName 
                            })
                        });
                        if (response.ok) {
                            location.reload();
                        } else {
                            const data = await response.json();
                            alert(`Error: ${data.error}`);
                        }
                    } catch (error) {
                        alert('Network error occurred');
                    }
                }
                hideContextMenu();
            });

            document.getElementById('delete-file').addEventListener('click', async () => {
                if (!selectedFile) return;
                if (confirm(`Are you sure you want to delete ${selectedFile}?`)) {
                    try {
                        const response = await fetch(`/api/server/${serverIndex}/files/delete`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ path: selectedFile })
                        });
                        if (response.ok) {
                            location.reload();
                        } else {
                            const data = await response.json();
                            alert(`Error: ${data.error}`);
                        }
                    } catch (error) {
                        alert('Network error occurred');
                    }
                }
                hideContextMenu();
            });

            document.getElementById('download-file').addEventListener('click', () => {
                if (!selectedFile) return;
                const link = document.createElement('a');
                link.href = `/api/server/${serverIndex}/file/download?path=${selectedFile}`;
                link.download = selectedFile.split('/').pop();
                link.click();
                hideContextMenu();
            });

            // Initialize CodeMirror with dark theme
            function initEditor() {
                if (editor) return;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'editor-wrapper';
                editorContainer.appendChild(wrapper);
                
                editor = CodeMirror(wrapper, {
                    mode: 'python',
                    theme: 'material-darker',
                    lineNumbers: true,
                    autofocus: false,
                    lineWrapping: true,
                    indentUnit: 4,
                    smartIndent: true,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    viewportMargin: Infinity,
                    extraKeys: {
                        "Ctrl-S": function() { saveFile(); },
                        "Cmd-S": function() { saveFile(); },
                        "Ctrl-/": function() { editor.toggleComment(); },
                        "Cmd-/": function() { editor.toggleComment(); }
                    }
                });

                editor.setOption("scrollbarStyle", "null");
                
                editor.on('cursorActivity', () => {
                    const cursor = editor.getCursor();
                    cursorPosition.textContent = `Ln ${cursor.line + 1}, Col ${cursor.ch + 1}`;
                });

                editor.on('change', () => {
                    if (activeTab) {
                        const tab = openTabs.get(activeTab);
                        if (tab && !tab.modified) {
                            tab.modified = true;
                            updateTabTitle(activeTab);
                        }
                        saveBtn.disabled = false;
                        saveBtnHeader.disabled = false;
                        saveBtn.classList.add('primary');
                    }
                });

                // Auto-save functionality
                let saveTimeout;
                editor.on('change', () => {
                    if (activeTab) {
                        clearTimeout(saveTimeout);
                        saveTimeout = setTimeout(autoSave, 3000);
                    }
                });

                // Prevent zoom on focus for iOS
                editor.on('focus', () => {
                    const viewport = document.querySelector('meta[name=viewport]');
                    if (viewport) {
                        viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0');
                    }
                });

                editor.on('blur', () => {
                    const viewport = document.querySelector('meta[name=viewport]');
                    if (viewport) {
                        viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, user-scalable=no');
                    }
                });
            }

            // Auto-save function
            async function autoSave() {
                if (activeTab && editor) {
                    const tab = openTabs.get(activeTab);
                    if (tab && tab.modified) {
                        try {
                            const response = await fetch(`/api/server/${serverIndex}/file?path=${activeTab}`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ content: editor.getValue() })
                            });
                            
                            if (response.ok) {
                                tab.modified = false;
                                tab.content = editor.getValue();
                                updateTabTitle(activeTab);
                                saveBtn.disabled = true;
                                saveBtnHeader.disabled = true;
                                saveBtn.classList.remove('primary');
                                addConsoleMessage(`Auto-saved: ${activeTab}`, 'success');
                            }
                        } catch (error) {
                            console.error('Auto-save error:', error);
                        }
                    }
                }
            }

            // File tree rendering with Lucide icons
            function renderFileTree(tree, container = fileTree, pathPrefix = '') {
                Object.entries(tree).forEach(([name, content]) => {
                    const fullPath = pathPrefix ? `${pathPrefix}/${name}` : name;
                    const item = document.createElement('button');
                    item.className = 'file-item touch-target';
                    item.dataset.path = fullPath;

                    const icon = document.createElement('i');
                    icon.className = 'file-icon';
                    const label = document.createElement('span');
                    label.textContent = name;

                    if (typeof content === 'object') {
                        // Folder
                        item.classList.add('folder-item');
                        icon.setAttribute('data-lucide', 'folder');
                        item.appendChild(icon);
                        item.appendChild(label);
                    } else {
                        // File
                        const ext = name.split('.').pop().toLowerCase();
                        switch(ext) {
                            case 'py':
                                icon.setAttribute('data-lucide', 'file-code');
                                break;
                            case 'json':
                                icon.setAttribute('data-lucide', 'braces');
                                break;
                            case 'txt':
                            case 'md':
                                icon.setAttribute('data-lucide', 'file-text');
                                break;
                            case 'js':
                                icon.setAttribute('data-lucide', 'file-code');
                                break;
                            case 'css':
                                icon.setAttribute('data-lucide', 'palette');
                                break;
                            case 'html':
                                icon.setAttribute('data-lucide', 'globe');
                                break;
                            case 'yml':
                            case 'yaml':
                                icon.setAttribute('data-lucide', 'settings');
                                break;
                            default:
                                icon.setAttribute('data-lucide', 'file');
                        }
                        item.appendChild(icon);
                        item.appendChild(label);
                        item.addEventListener('click', () => openFile(fullPath));
                        item.addEventListener('contextmenu', (e) => showContextMenu(e, fullPath));
                    }

                    container.appendChild(item);
                });
                lucide.createIcons();
            }

            // File operations
            async function openFile(path) {
                try {
                    if (!openTabs.has(path)) {
                        const response = await fetch(`/api/server/${serverIndex}/file?path=${path}`, {
                            headers: {
                                'Content-Type': 'application/json',
                            }
                        });
                        const data = await response.json();
                        
                        if (response.ok && data.content !== undefined) {
                            openTabs.set(path, {
                                content: data.content,
                                modified: false,
                                path: path
                            });
                            createMobileTab(path);
                            addConsoleMessage(`Opened: ${path}`, 'info');
                        } else {
                            console.error('Error opening file:', data.error);
                            addConsoleMessage(`Error opening file: ${data.error}`, 'error');
                            return;
                        }
                    }
                    switchToTab(path);
                    closeSidebar();
                } catch (error) {
                    console.error('Network error:', error);
                    addConsoleMessage('Network error occurred', 'error');
                }
            }

            function createMobileTab(path) {
                const tab = document.createElement('button');
                tab.className = 'mobile-tab touch-target';
                tab.dataset.path = path;
                
                const fileName = path.split('/').pop();
                const label = document.createElement('span');
                label.textContent = fileName;
                
                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close touch-target';
                const closeIcon = document.createElement('i');
                closeIcon.setAttribute('data-lucide', 'x');
                closeIcon.setAttribute('size', '14');
                closeBtn.appendChild(closeIcon);
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(path);
                });

                tab.appendChild(label);
                tab.appendChild(closeBtn);
                tab.addEventListener('click', () => switchToTab(path));

                tabsWrapper.appendChild(tab);
                lucide.createIcons();
                
                if (mobileTabs.style.display === 'none') {
                    mobileTabs.style.display = 'flex';
                }
            }

            function switchToTab(path) {
                document.querySelectorAll('.mobile-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.path === path);
                });

                document.querySelectorAll('.file-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.path === path);
                });

                activeTab = path;
                const tabData = openTabs.get(path);
                
                if (tabData) {
                    if (!editor) {
                        emptyState.style.display = 'none';
                        initEditor();
                    }
                    
                    editor.setValue(tabData.content);
                    setTimeout(() => editor.refresh(), 100);
                    const fileName = path.split('/').pop();
                    currentFileName.textContent = fileName;
                    
                    saveBtn.disabled = !tabData.modified;
                    saveBtnHeader.disabled = !tabData.modified;
                    
                    if (!tabData.modified) {
                        saveBtn.classList.remove('primary');
                    }
                }
            }

            function closeTab(path) {
                const tab = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                if (tab) tab.remove();
                
                openTabs.delete(path);
                addConsoleMessage(`Closed: ${path}`, 'info');
                
                if (activeTab === path) {
                    const remainingTabs = document.querySelectorAll('.mobile-tab');
                    if (remainingTabs.length > 0) {
                        switchToTab(remainingTabs[0].dataset.path);
                    } else {
                        activeTab = null;
                        currentFileName.textContent = 'Select a file';
                        if (editor) {
                            editorContainer.removeChild(editorContainer.querySelector('.editor-wrapper'));
                            editor = null;
                            emptyState.style.display = 'flex';
                        }
                        saveBtn.disabled = true;
                        saveBtnHeader.disabled = true;
                        saveBtn.classList.remove('primary');
                        mobileTabs.style.display = 'none';
                    }
                }
            }

            function updateTabTitle(path) {
                const tab = document.querySelector(`.mobile-tab[data-path="${path}"]`);
                const tabData = openTabs.get(path);
                if (tab && tabData) {
                    const label = tab.querySelector('span');
                    const fileName = path.split('/').pop();
                    label.textContent = tabData.modified ? `${fileName} •` : fileName;
                }
            }

            // Save file
            async function saveFile() {
                if (!activeTab || !editor) return;
                
                try {
                    saveBtn.disabled = true;
                    saveBtnHeader.disabled = true;
                    
                    // Show loading state
                    const saveIcon = saveBtn.querySelector('i');
                    const originalIcon = saveIcon.getAttribute('data-lucide');
                    saveIcon.setAttribute('data-lucide', 'loader-2');
                    saveIcon.classList.add('spinner');
                    lucide.createIcons();
                    
                    const response = await fetch(`/api/server/${serverIndex}/file?path=${activeTab}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: editor.getValue() })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        const tabData = openTabs.get(activeTab);
                        if (tabData) {
                            tabData.modified = false;
                            tabData.content = editor.getValue();
                            updateTabTitle(activeTab);
                            saveBtn.classList.remove('primary');
                            addConsoleMessage(`Saved: ${activeTab}`, 'success');
                        }
                    } else {
                        console.error('Error saving file:', data.error);
                        addConsoleMessage(`Error saving file: ${data.error}`, 'error');
                        saveBtn.disabled = false;
                        saveBtnHeader.disabled = false;
                    }
                    
                    // Restore save icon
                    saveIcon.setAttribute('data-lucide', originalIcon);
                    saveIcon.classList.remove('spinner');
                    lucide.createIcons();
                } catch (error) {
                    console.error('Network error:', error);
                    addConsoleMessage('Network error occurred', 'error');
                    saveBtn.disabled = false;
                    saveBtnHeader.disabled = false;
                }
            }

            saveBtn.addEventListener('click', saveFile);
            saveBtnHeader.addEventListener('click', saveFile);

            // New file/folder
            document.getElementById('new-file-btn').addEventListener('click', async () => {
                const path = prompt("Enter new file path (e.g., main.py):");
                if (path) {
                    try {
                        const response = await fetch(`/api/server/${serverIndex}/files/create`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ path: path, type: 'file' })
                        });
                        
                        if (response.ok) {
                            addConsoleMessage(`Created file: ${path}`, 'success');
                            location.reload();
                        } else {
                            const data = await response.json();
                            alert(`Error: ${data.error}`);
                            addConsoleMessage(`Error creating file: ${data.error}`, 'error');
                        }
                    } catch (error) {
                        console.error('Error creating file:', error);
                        alert('Network error occurred');
                        addConsoleMessage('Network error occurred', 'error');
                    }
                }
            });

            document.getElementById('new-folder-btn').addEventListener('click', async () => {
                const path = prompt("Enter new folder path:");
                if (path) {
                    try {
                        const response = await fetch(`/api/server/${serverIndex}/files/create`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ path: path, type: 'folder' })
                        });
                        
                        if (response.ok) {
                            addConsoleMessage(`Created folder: ${path}`, 'success');
                            location.reload();
                        } else {
                            const data = await response.json();
                            alert(`Error: ${data.error}`);
                            addConsoleMessage(`Error creating folder: ${data.error}`, 'error');
                        }
                    } catch (error) {
                        console.error('Error creating folder:', error);
                        alert('Network error occurred');
                        addConsoleMessage('Network error occurred', 'error');
                    }
                }
            });

            // Load file tree from server
            async function loadFileTree() {
                try {
                    const response = await fetch(`/api/server/${serverIndex}/files`);
                    const data = await response.json();
                    
                    if (response.ok) {
                        renderFileTree(data.files);
                        addConsoleMessage('File tree loaded', 'success');
                    } else {
                        console.error('Error loading file tree:', data.error);
                        addConsoleMessage(`Error loading file tree: ${data.error}`, 'error');
                    }
                } catch (error) {
                    console.error('Network error:', error);
                    addConsoleMessage('Network error loading file tree', 'error');
                    
                    // Fallback to sample data
                    const sampleFileTree = {
                        'main.py': 'print("Hello World")',
                        'config.json': '{}',
                        'requirements.txt': 'flask\nsocket.io',
                        'README.md': '# Bot Project',
                        'src': {
                            'utils.py': '# Utility functions',
                            'models.py': '# Data models'
                        }
                    };
                    renderFileTree(sampleFileTree);
                }
            }

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (!saveBtn.disabled) {
                        saveFile();
                    }
                }
                
                if ((e.ctrlKey || e.metaKey) && e.key === '`') {
                    e.preventDefault();
                    consoleToggle.click();
                }
                
                if ((e.ctrlKey || e.metaKey) && e.key === 'w' && activeTab) {
                    e.preventDefault();
                    closeTab(activeTab);
                }
            });

            // Initialize everything
            initSocket();
            loadFileTree();
            updateBotControlButtons();

            if (socket) {
                socket.emit('get_bot_status', { server_index: serverIndex, bot_id: botId });
            }
        });
    </script>
</body>
</html>
