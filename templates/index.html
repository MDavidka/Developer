<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sycord for Developers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page-container">

    {% if current_user.is_authenticated %}
        <div>
            <h1>Welcome, {{ current_user.username }}</h1>
            <div class="actions">
                <a href="{{ url_for('dashboard') }}" class="button">Go to Dashboard</a>
                <a href="{{ url_for('logout') }}" class="button button-secondary">Logout</a>
            </div>
        </div>
    {% else %}
        <h1 id="sycord-title" class="sycord-title-center">Sycord</h1>
        <div id="login-container" class="login-container">
             <a href="{{ url_for('login') }}" class="button">Login with Discord</a>
        </div>
    {% endif %}

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userIsAuthenticated = {{ current_user.is_authenticated|tojson }};
            if (!userIsAuthenticated) {
                setTimeout(() => {
                    document.getElementById('sycord-title').classList.add('sycord-title-top');
                    document.getElementById('login-container').classList.add('login-container-visible');
                }, 500);
            }
        });
    </script>
</body>
</html>
