<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sycord for Developers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="create-bot-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Create a New Bot</h3>
            <form action="{{ url_for('create_bot') }}" method="post">
                <div class="form-group">
                    <label for="bot_name">Bot Name</label>
                    <input type="text" id="bot_name" name="bot_name" required>
                </div>
                <div class="form-group">
                    <label for="startup_command">Startup Command</label>
                    <input type="text" id="startup_command" name="startup_command" required>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-create-bot" class="button button-secondary">Cancel</button>
                    <button type="submit" class="button">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <h1>Sycord Dashboard</h1>
            <div>
                <span>Welcome, {{ user.username }}!</span>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </header>

        <main class="app-main">
            <div class="dashboard-toolbar">
                <h2>Your Bots</h2>
                <button id="create-bot-btn" class="button">Create New Bot</button>
            </div>

            <div class="bot-grid">
                {% if bots %}
                    {% for bot in bots %}
                        <div class="card bot-card">
                            <h3>{{ bot.name }}</h3>
                            <p class="status">
                                <span class="dot {{ 'online' if bot.status == 'online' else 'offline' }}"></span>
                                <span>{{ bot.status }}</span>
                            </p>
                            <div class="actions">
                                <a href="{{ url_for('editor', bot_id=bot._id) }}" class="button button-secondary">Edit</a>
                                <button class="start-bot-btn button button-secondary" data-bot-id="{{ bot._id }}">Start</button>
                                <button class="stop-bot-btn button button-secondary" data-bot-id="{{ bot._id }}">Stop</button>
                            </div>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="card empty-state">
                        <p>You don't have any bots yet.</p>
                        <button id="create-bot-btn-empty" class="button">Create One</button>
                    </div>
                {% endif %}
            </div>
        </main>
    </div>

    <footer>
        <p>Sycord for Developers.</p>
    </footer>

    <script>
        function showCreateModal() {
            document.getElementById('create-bot-modal').style.display = 'flex';
        }
        function hideCreateModal() {
            document.getElementById('create-bot-modal').style.display = 'none';
        }
        document.getElementById('create-bot-btn').addEventListener('click', showCreateModal);
        const emptyCreateBtn = document.getElementById('create-bot-btn-empty');
        if (emptyCreateBtn) {
            emptyCreateBtn.addEventListener('click', showCreateModal);
        }
        document.getElementById('cancel-create-bot').addEventListener('click', hideCreateModal);

        document.querySelectorAll('.start-bot-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const botId = btn.dataset.botId;
                await fetch(`/api/bot/${botId}/start`, { method: 'POST' });
                location.reload();
            });
        });
        document.querySelectorAll('.stop-bot-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const botId = btn.dataset.botId;
                await fetch(`/api/bot/${botId}/stop`, { method: 'POST' });
                location.reload();
            });
        });
    </script>
</body>
</html>
