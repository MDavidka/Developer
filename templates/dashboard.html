<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sycord for Developers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Updated styles for frosted glass inputs and modal */
        #create-bot-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #fff;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #fff;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(5px);
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(76, 175, 80, 0.6);
            background: rgba(255, 255, 255, 0.15);
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .helper-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            display: block;
            margin-top: 0.3rem;
        }
        .error-text {
            color: #ff6b6b;
            font-size: 0.8rem;
            display: none;
            margin-top: 0.3rem;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1.5rem;
        }
        #loading-spinner {
            display: none;
            animation: spin 1s linear infinite;
            color: #fff;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="app-container">
    <header class="app-header">
        <div class="logo">Sycord <span class="logo-dev">Dev</span></div>
        <a href="{{ url_for('logout') }}" title="Logout">
            <img src="{{ user.avatar_url or url_for('static', filename='img/default_avatar.png') }}" alt="User Avatar" class="avatar">
        </a>
    </header>

    <main class="app-main">
        <div class="dashboard-toolbar">
            <h2>Your Bots</h2>
        </div>

        <div class="bot-grid">
            {% if servers %}
                {% for server in servers %}
                    <div class="bot-card frosted-glass">
                        <div class="bot-card-header">
                            <div class="bot-info">
                                <h3 class="bot-name-container">
                                    {{ server.customBotName }}
                                    <span class="bot-icon-dot"></span>
                                </h3>
                                <p class="server-name">{{ server.server_name }}</p>
                            </div>
                        </div>
                        <div class="actions">
                            <a href="{{ url_for('editor', server_index=loop.index0) }}" class="button-2">Edit</a>
                            <a href="https://sycord.com" class="button-2">Return to Sycord.com</a>
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="bot-card empty-state frosted-glass">
                    <p>No bots found. They are created on our main website.</p>
                </div>
            {% endif %}
        </div>
    </main>

    <footer>
        <p>Sycord for Developers.</p>
    </footer>

    <script>
        // Bot start/stop logic might need to be re-evaluated based on new backend
    </script>
</body>
</html>
